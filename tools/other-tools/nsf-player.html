<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSF Reader & Note Logger | Cartridge Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <script src="https://bbbradsmith.github.io/nsfplay/nsfplayer.js"></script>

    <style>
        .nsf-wrapper {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 2rem auto;
            background: rgba(12, 12, 24, 0.95);
            border: 4px solid #6e6e8a;
            outline: 4px solid #3d3d56;
            outline-offset: 6px;
            box-shadow: 0 0 0 4px #1e1e2f, 0 0 0 8px #0a0a14, 0 10px 30px rgba(0,0,0,0.7);
            padding: 1.5rem;
            border-radius: 4px;
            text-align: center;
        }
        .nsf-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }
        .nsf-wrapper > * { position: relative; z-index: 20; }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #cfba8c;
            margin-bottom: 0.5rem;
        }

        .file-area { margin: 1rem 0; }
        .file-area label {
            display: inline-block;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 0.5rem 1rem;
            background: #2a2a3c;
            border: 2px solid #4b4b68;
            color: #cfba8c;
            cursor: pointer;
        }
        .file-area input { display: none; }

        .info-table {
            width: 100%;
            margin: 1.5rem 0;
            border-collapse: collapse;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.45rem;
            color: #9da5b4;
        }
        .info-table td {
            padding: 0.4rem;
            border-bottom: 1px solid #3f3f5c;
        }
        .info-table td:first-child { color: #cfba8c; width: 40%; }

        .track-list {
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem;
            margin: 0.2rem 0;
            background: #1e1e2e;
            border: 1px solid #3f3f5c;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            color: #cdcdd4;
            cursor: pointer;
            transition: all 0.1s;
        }
        .track-item:hover { background: #4b4a6e; border-color: #cfba8c; }
        .track-item.selected {
            background: #3a3a52;
            border-color: #7a8cbf;
            color: #f0e6d2;
            box-shadow: 0 0 6px rgba(122,140,191,0.4);
        }

        .player-controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: #2a2a3c;
            border: 2px solid #4b4b68;
            color: #d1d1db;
            cursor: pointer;
            box-shadow: 3px 3px 0 #0a0a14;
            transition: 0.1s;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #0a0a14;
            background: #4b4a6e;
        }
        .pixel-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            background: #2a2a3c;
            color: #6b6b80;
        }

        canvas#oscCanvas {
            width: 100%;
            height: 100px;
            background: #0a0a14;
            border: 2px solid #4b4b68;
            margin-top: 1rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
        }

        .note-log {
            background: #0e0e1a;
            border: 2px solid #4b4b68;
            padding: 0.8rem;
            margin-top: 1rem;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #6c9;
        }
        .export-buttons {
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="nsf-wrapper">
        <h2>🎵 NSF READER + NOTE LOG</h2>
        <p style="font-family:'Press Start 2P',cursive;font-size:0.5rem;color:#9da5b4;">UPLOAD .NSF &amp; OPTIONAL .M3U</p>

        <div class="file-area">
            <label for="nsfFile">📁 SELECT NSF</label>
            <input type="file" id="nsfFile" accept=".nsf">
            <label for="m3uFile" style="margin-left:0.5rem;">📋 M3U (OPT)</label>
            <input type="file" id="m3uFile" accept=".m3u">
        </div>

        <table class="info-table" id="infoTable" style="display:none;">
            <tr><td>TITLE</td><td id="nsfTitle">-</td></tr>
            <tr><td>ARTIST</td><td id="nsfArtist">-</td></tr>
            <tr><td>COPYRIGHT</td><td id="nsfCopyright">-</td></tr>
            <tr><td>VERSION</td><td id="nsfVersion">-</td></tr>
            <tr><td>TOTAL SONGS</td><td id="nsfTotalSongs">-</td></tr>
        </table>

        <div class="track-list" id="trackList"></div>

        <div class="player-controls" id="playerControls" style="display:none;">
            <button class="pixel-btn" id="playBtn">▶ PLAY</button>
            <button class="pixel-btn" id="stopBtn" disabled>⏹ STOP</button>
        </div>

        <canvas id="oscCanvas"></canvas>

        <div class="note-log" id="noteLog">
            <em>Note log will appear here during playback...</em>
        </div>

        <div class="export-buttons" id="exportButtons" style="display:none;">
            <button class="pixel-btn" id="exportJsonBtn">EXPORT JSON</button>
            <button class="pixel-btn" id="copyTxtBtn">COPY TXT</button>
        </div>
    </div>

    <script>
        (() => {
            const nsfInput = document.getElementById('nsfFile');
            const m3uInput = document.getElementById('m3uFile');
            const trackListDiv = document.getElementById('trackList');
            const playerControls = document.getElementById('playerControls');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');
            const noteLogDiv = document.getElementById('noteLog');
            const exportButtons = document.getElementById('exportButtons');
            const exportJsonBtn = document.getElementById('exportJsonBtn');
            const copyTxtBtn = document.getElementById('copyTxtBtn');
            const canvas = document.getElementById('oscCanvas');
            const ctx = canvas.getContext('2d');

            let nsfData = null;
            let totalSongs = 0;
            let player = null;
            let analyser = null;
            let isPlaying = false;
            let selectedTrackIndex = null;
            let playlist = [];
            let noteLog = [];           // array of { time, note }
            let noteLogInterval = null;

            const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

            async function initPlayer() {
                if (player) return;
                player = new NSFPlayer();
                await player.ready;
                // Analyser untuk audio visual + deteksi not
                const audioCtx = player.context;
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 4096;          // resolusi tinggi untuk deteksi pitch
                analyser.smoothingTimeConstant = 0.7;
                // Hubungkan ke destination (sudah default dari player? kita override)
                // Pastikan player.output terhubung ke analyser lalu destination
                player.output = analyser;
                analyser.connect(audioCtx.destination);
            }

            function parseNSFHeader(buffer) {
                const view = new DataView(buffer);
                if (view.getUint8(0) !== 0x4E || view.getUint8(1) !== 0x45 || view.getUint8(2) !== 0x53 || view.getUint8(3) !== 0x4D || view.getUint8(4) !== 0x1A) {
                    throw new Error('Not a valid NSF file');
                }
                const version = view.getUint8(5);
                totalSongs = view.getUint8(6);
                let gameName = '';
                for (let i = 0x0E; i < 0x0E+16; i++) {
                    const byte = view.getUint8(i);
                    if (byte === 0) break;
                    gameName += String.fromCharCode(byte);
                }
                let artist = '';
                for (let i = 0x1E; i < 0x1E+16; i++) {
                    const byte = view.getUint8(i);
                    if (byte === 0) break;
                    artist += String.fromCharCode(byte);
                }
                let copyright = '';
                for (let i = 0x2E; i < 0x2E+16; i++) {
                    const byte = view.getUint8(i);
                    if (byte === 0) break;
                    copyright += String.fromCharCode(byte);
                }
                return { version, totalSongs, gameName, artist, copyright };
            }

            function parseM3U(text) {
                const lines = text.split(/\r?\n/);
                const tracks = [];
                for (const line of lines) {
                    if (line.startsWith('#') || line.trim() === '') continue;
                    const match = line.match(/::NSF,(\d+),(.*),(\d+),(\d+),(\d+)/);
                    if (match) {
                        tracks.push({
                            track: parseInt(match[1]),
                            name: match[2],
                            duration: parseInt(match[3])*60 + parseInt(match[4]),
                            fade: parseInt(match[5]),
                        });
                    } else {
                        const parts = line.split(',');
                        if (parts.length >= 2) tracks.push({ track: parseInt(parts[0]), name: parts[1] });
                    }
                }
                return tracks;
            }

            function renderTrackList() {
                trackListDiv.innerHTML = '';
                if (playlist.length > 0) {
                    playlist.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'track-item';
                        div.dataset.index = index;
                        div.innerHTML = `<span>${item.track}. ${item.name}</span><span>TRACK ${item.track}</span>`;
                        div.addEventListener('click', () => selectTrack(index));
                        trackListDiv.appendChild(div);
                    });
                } else {
                    for (let i = 1; i <= totalSongs; i++) {
                        const index = i-1;
                        const div = document.createElement('div');
                        div.className = 'track-item';
                        div.dataset.index = index;
                        div.innerHTML = `<span>Track ${i}</span><span>TRACK ${i}</span>`;
                        div.addEventListener('click', () => selectTrack(index));
                        trackListDiv.appendChild(div);
                    }
                }
            }

            function selectTrack(index) {
                selectedTrackIndex = index;
                const items = trackListDiv.querySelectorAll('.track-item');
                items.forEach((item, i) => {
                    if (i === index) item.classList.add('selected');
                    else item.classList.remove('selected');
                });
                playBtn.disabled = false;   // enable play jika belum dimulai
                stopBtn.disabled = true;
                clearNoteLog();
            }

            async function playSelectedTrack() {
                if (selectedTrackIndex === null) return;
                if (!player) await initPlayer();
                if (isPlaying) {
                    player.stop();
                    stopNoteLogging();
                }
                const trackNum = selectedTrackIndex + 1;
                player.rom = new Uint8Array(nsfData);
                player.start(trackNum);
                isPlaying = true;
                playBtn.disabled = true;
                stopBtn.disabled = false;
                startNoteLogging();
                updateNoteLogDisplay();
                exportButtons.style.display = 'none'; // sembunyikan saat mulai baru
            }

            function stopPlayback() {
                if (player) {
                    player.stop();
                    isPlaying = false;
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                    stopNoteLogging();
                }
            }

            // ======== PENDETEKSI NOT ========
            function startNoteLogging() {
                noteLog = [];
                // Interval 200ms untuk mencatat not
                noteLogInterval = setInterval(() => {
                    if (!isPlaying || !analyser) return;
                    const freq = detectFrequency();
                    if (freq && freq > 20) {
                        const note = frequencyToNote(freq);
                        noteLog.push({
                            time: (performance.now() / 1000).toFixed(2),
                            note: note,
                            freq: Math.round(freq)
                        });
                        updateNoteLogDisplay();
                    }
                }, 200);
            }

            function stopNoteLogging() {
                if (noteLogInterval) {
                    clearInterval(noteLogInterval);
                    noteLogInterval = null;
                }
                // Tampilkan tombol ekspor jika ada data
                if (noteLog.length > 0) {
                    exportButtons.style.display = 'flex';
                }
            }

            function clearNoteLog() {
                noteLog = [];
                noteLogDiv.innerHTML = '<em>Note log will appear here during playback...</em>';
                exportButtons.style.display = 'none';
            }

            function detectFrequency() {
                const bufferLength = analyser.fftSize;
                const dataArray = new Float32Array(bufferLength);
                analyser.getFloatTimeDomainData(dataArray);
                // Autokorelasi sederhana untuk deteksi fundamental
                let bestLag = 0;
                let bestCorr = 0;
                const sampleRate = player.context.sampleRate;
                // Hanya cek lag untuk frekuensi 50Hz - 2000Hz
                const minLag = Math.floor(sampleRate / 2000);
                const maxLag = Math.floor(sampleRate / 50);
                for (let lag = minLag; lag <= maxLag; lag++) {
                    let corr = 0;
                    for (let i = 0; i < bufferLength - lag; i++) {
                        corr += dataArray[i] * dataArray[i+lag];
                    }
                    if (corr > bestCorr) {
                        bestCorr = corr;
                        bestLag = lag;
                    }
                }
                if (bestLag > 0) {
                    return sampleRate / bestLag;
                }
                return null;
            }

            function frequencyToNote(freq) {
                const noteNum = 12 * Math.log2(freq / 440) + 69;
                const rounded = Math.round(noteNum);
                const octave = Math.floor(rounded / 12) - 1;
                const name = NOTE_NAMES[rounded % 12];
                return `${name}${octave}`;
            }

            function updateNoteLogDisplay() {
                const lastNotes = noteLog.slice(-8); // tampilkan 8 terakhir
                noteLogDiv.innerHTML = lastNotes.map(n => `[${n.time}s] ${n.note} (${n.freq}Hz)`).join('<br>');
                if (lastNotes.length === 0) noteLogDiv.innerHTML = '<em>Listening...</em>';
            }

            // ======== EKSPOR ========
            function exportAsJSON() {
                const dataStr = JSON.stringify(noteLog, null, 2);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'nsf_notes.json';
                a.click();
                URL.revokeObjectURL(url);
            }

            function copyAsText() {
                const text = noteLog.map(n => `${n.time}\t${n.note}`).join('\n');
                navigator.clipboard.writeText(text).then(() => {
                    alert('Note log copied to clipboard!');
                });
            }

            // ======== FILE LOADING ========
            async function loadNSF(file) {
                const buffer = await file.arrayBuffer();
                nsfData = buffer;
                const info = parseNSFHeader(buffer);
                document.getElementById('nsfTitle').textContent = info.gameName || 'Untitled';
                document.getElementById('nsfArtist').textContent = info.artist || 'Unknown';
                document.getElementById('nsfCopyright').textContent = info.copyright || 'Unknown';
                document.getElementById('nsfVersion').textContent = info.version;
                document.getElementById('nsfTotalSongs').textContent = info.totalSongs;
                document.getElementById('infoTable').style.display = 'table';
                totalSongs = info.totalSongs;
                if (window.m3uBuffer) {
                    playlist = parseM3U(new TextDecoder().decode(window.m3uBuffer));
                } else {
                    playlist = [];
                }
                renderTrackList();
                playerControls.style.display = 'flex';
                playBtn.disabled = true;
                stopBtn.disabled = true;
                selectedTrackIndex = null;
                clearNoteLog();
            }

            async function loadM3U(file) {
                const buffer = await file.arrayBuffer();
                window.m3uBuffer = buffer;
                if (nsfData) {
                    playlist = parseM3U(new TextDecoder().decode(buffer));
                    renderTrackList();
                }
            }

            nsfInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) loadNSF(file);
            });

            m3uInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) loadM3U(file);
            });

            playBtn.addEventListener('click', playSelectedTrack);
            stopBtn.addEventListener('click', stopPlayback);
            exportJsonBtn.addEventListener('click', exportAsJSON);
            copyTxtBtn.addEventListener('click', copyAsText);

            // Osiloskop visual
            function drawOsc() {
                if (!canvas || !ctx) return;
                const w = canvas.width = canvas.clientWidth;
                const h = canvas.height = canvas.clientHeight;
                ctx.clearRect(0, 0, w, h);

                if (isPlaying && analyser) {
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    analyser.getByteTimeDomainData(dataArray);
                    ctx.strokeStyle = '#e64300';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const sliceWidth = w / bufferLength;
                    let x = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = (v * h) / 2;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                        x += sliceWidth;
                    }
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = '#3f3f5c';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, h/2);
                    ctx.lineTo(w, h/2);
                    ctx.stroke();
                }

                ctx.strokeStyle = 'rgba(78,78,104,0.3)';
                ctx.lineWidth = 1;
                for (let i = 0; i < w; i += 8) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
                }
                for (let i = 0; i < h; i += 8) {
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
                }
                requestAnimationFrame(drawOsc);
            }
            drawOsc();
        })();
    </script>
</body>
</html>
