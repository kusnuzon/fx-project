<!-- tools/emulator-tools/nes-emulator.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NES Emulator – CARTRIDGE VAULT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../data/css/retro-theme.css">
    <link rel="stylesheet" href="../../data/css/nes-emulator.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/nostalgist"></script>
    <script src="../../data/js/virtual-gamepad.js"></script>
    <script src="../../data/js/nes-emulator.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎮 NES EMULATOR</h1>
        <p class="subtitle" style="text-align:center;">Drop .nes / .zip ROM</p>

        <div class="nes-dropzone" id="dropZone">
            ⬇️ Drop .nes / .zip file here<br>
            <span style="font-size:0.4rem;">or click to select</span>
        </div>

        <div class="nes-controls" id="controls" style="display:none;">
            <button id="btnStop">⏹️ STOP</button>
            <button id="btnReset">🔄 RESET</button>
            <button id="btnFullscreen">📺 FULLSCREEN</button>
            <button id="btnSettings" title="Gamepad Layout">⚙️</button>
        </div>

        <!-- Layout Editor Modal -->
        <div class="layout-editor-modal" id="layoutEditorModal">
            <div class="layout-editor-overlay"></div>
            <div class="layout-editor-content">
                <div class="layout-editor-header">
                    <h3>🎮 GAMEPAD LAYOUT</h3>
                    <button class="close-btn" id="btnCloseEditor">✕</button>
                </div>
                <p style="font-size:0.45rem;color:#9da5b4;text-align:center;margin-bottom:0.5rem;">
                    Drag group boxes to set position
                </p>
                <div class="orientation-tabs">
                    <button class="active" data-ori="portrait">📱 PORTRAIT</button>
                    <button data-ori="landscape">🖥️ LANDSCAPE</button>
                </div>
                <div class="editor-canvas-area" id="editorCanvasArea"></div>
                <div class="editor-info">
                    <span id="selectedName">Click a group</span>
                    <div class="coord-inputs">
                        <label>X% <input type="number" id="posX" min="0" max="100" step="0.5"></label>
                        <label>Y% <input type="number" id="posY" min="0" max="100" step="0.5"></label>
                    </div>
                </div>
                <div class="editor-actions">
                    <button id="btnExport">📋 EXPORT</button>
                    <button id="btnImport">📥 IMPORT</button>
                    <button id="btnResetLayout">🔄 RESET</button>
                </div>
            </div>
        </div>

        <div class="nes-emulator-wrapper" id="emuWrapper"></div>

        <!-- Virtual Gamepad Container -->
        <div class="virtual-gamepad" id="virtualGamepad" style="display:none;"></div>

        <div class="nes-status" id="statusText">Ready</div>
    </div>

    <footer>🛠️ CARTRIDGE VAULT</footer>
</body>
</html>
