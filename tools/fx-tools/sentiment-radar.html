<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Radar | Cartridge Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">
    <style>
        .radar-wrapper {
            position: relative;
            z-index: 2;
            max-width: 650px;
            margin: 2rem auto;
            background: rgba(18, 18, 30, 0.9);
            backdrop-filter: blur(4px);
            border: 4px solid #6e6e8a;
            outline: 4px solid #3d3d56;
            outline-offset: 6px;
            box-shadow: 0 0 0 4px #1e1e2f, 0 0 0 8px #0a0a14, 0 10px 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.4);
            padding: 2rem;
            border-radius: 4px;
        }
        .radar-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }
        .radar-wrapper > * { position: relative; z-index: 20; }
        h2 { font-family: 'Press Start 2P', cursive; font-size: 0.9rem; color: #cfba8c; text-align: center; margin-bottom: 0.5rem; text-shadow: 2px 2px 0 #4a3e2c; }
        .sub { font-family: 'Press Start 2P', cursive; font-size: 0.45rem; color: #8e8ea0; text-align: center; margin-bottom: 1.5rem; }
        .radar-stage { display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #4e4e68; border-radius: 50%; background: #0a0a14; box-shadow: 0 0 20px rgba(78,78,104,0.4), inset 0 0 30px rgba(0,0,0,0.7); }
        .radar-legend { display: flex; gap: 2rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 0.4rem; font-family: 'Press Start 2P', cursive; font-size: 0.4rem; color: #9da5b4; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
<div class="radar-wrapper">
    <h2>📡 PIXEL RADAR</h2>
    <p class="sub">MARKET SENTIMENT / SONAR</p>
    <div class="radar-stage">
        <canvas id="radarCanvas" width="250" height="250"></canvas>
        <div class="radar-legend">
            <div class="legend-item"><span class="legend-dot" style="background:#6c9;"></span> BULLISH</div>
            <div class="legend-item"><span class="legend-dot" style="background:#e07373;"></span> BEARISH</div>
            <div class="legend-item"><span class="legend-dot" style="background:#9da5b4;"></span> NEUTRAL</div>
        </div>
    </div>
    <p style="text-align:center;font-family:'Press Start 2P',cursive;font-size:0.4rem;color:#5e5e78;margin-top:0.5rem;">PING EVERY 3 SECONDS</p>
</div>
<script>
    (function() {
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 100;

        const pairs = [
            { name: "EUR/USD", angle: 0, distance: 0.7, bullish: true },
            { name: "GBP/USD", angle: 72, distance: 0.5, bullish: true },
            { name: "USD/JPY", angle: 144, distance: 0.8, bullish: false },
            { name: "AUD/USD", angle: 216, distance: 0.4, bullish: true },
            { name: "USD/CAD", angle: 288, distance: 0.6, bullish: false }
        ];

        function drawRadar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Circles
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, (radius / 4) * i, 0, 2 * Math.PI);
                ctx.strokeStyle = '#3f3f5c';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            // Cross lines
            for (let a = 0; a < 360; a += 72) {
                const rad = (a * Math.PI) / 180;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(rad) * radius, centerY + Math.sin(rad) * radius);
                ctx.strokeStyle = '#3f3f5c';
                ctx.stroke();
            }

            // Sweep line animation
            const sweepAngle = (Date.now() / 800) % 360;
            const sweepRad = (sweepAngle * Math.PI) / 180;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + Math.cos(sweepRad) * radius, centerY + Math.sin(sweepRad) * radius);
            ctx.strokeStyle = 'rgba(207, 186, 140, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Blips
            pairs.forEach(p => {
                const angleRad = (p.angle * Math.PI) / 180;
                const dist = (p.distance + Math.sin(Date.now()/1000 + p.angle)*0.05) * radius;
                const x = centerX + Math.cos(angleRad) * dist;
                const y = centerY + Math.sin(angleRad) * dist;

                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = p.bullish ? '#6c9' : '#e07373';
                ctx.fill();
                ctx.fillStyle = '#f0e6d2';
                ctx.font = '5px "Press Start 2P"';
                ctx.fillText(p.name, x + 6, y + 3);
            });

            requestAnimationFrame(drawRadar);
        }
        drawRadar();
    })();
</script>
</body>
</html>
