<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Pattern Cheatsheet - Cartridge Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* =============================================
           GLOBAL RETRO THEME (Diambil dari sistem Anda)
           ============================================= */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #101018;
            color: #cdcdd4;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(120,120,150,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120,120,150,0.07) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,200,0.4), transparent),
                radial-gradient(1px 1px at 85% 15%, rgba(200,220,255,0.35), transparent),
                radial-gradient(1.5px 1.5px at 40% 70%, rgba(220,200,255,0.3), transparent),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,180,0.4), transparent),
                radial-gradient(1.2px 1.2px at 25% 90%, rgba(180,220,255,0.25), transparent);
            background-size: 200px 200px;
            animation: driftStars 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes driftStars {
            from { background-position: 0 0; }
            to   { background-position: -200px -200px; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 2rem auto;
            background: rgba(16, 16, 28, 0.9);
            backdrop-filter: blur(4px);
            border: 3px solid #5a5a7a;
            border-radius: 6px;
            box-shadow:
                0 0 0 4px #1a1a2e,
                0 0 0 8px #0a0a14,
                0 10px 30px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(0,0,0,0.5);
            padding: 2rem;
        }

        h1, h2 {
            font-family: 'Press Start 2P', cursive;
            color: #b9a88c;
            text-align: center;
            text-shadow: 2px 2px 0 #3b3224;
        }
        
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #7a7a95;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- TABS Bawaan --- */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #4b4b68;
        }
        .tab-btn {
            flex: 1;
            padding: 0.7rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            background: transparent;
            color: #7a7a95;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            outline: none;
        }
        .tab-btn.active {
            color: #cfba8c;
            border-bottom: 3px solid #cfba8c;
            background: rgba(207,186,140,0.08);
        }
        .tab-btn:hover:not(.active) { color: #b9a88c; background: rgba(255,255,255,0.02);}

        /* =============================================
           CHEATSHEET SPECIFIC STYLES
           ============================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .pattern-card {
            background: #1e1e2e;
            border: 2px solid #3f3f5c;
            border-radius: 8px;
            padding: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: crosshair;
        }

        .pattern-card:hover {
            border-color: #b9a88c;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(207,186,140,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px dashed #4b4b68;
            padding-bottom: 0.5rem;
        }

        .pattern-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65rem;
            color: #f0e6d2;
            line-height: 1.4;
        }

        .badge {
            font-size: 0.6rem;
            padding: 0.3rem 0.5rem;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge.bullish { background: #2a3a2a; color: #6c9; border: 1px solid #6c9; }
        .badge.bearish { background: #3a2a2a; color: #e07373; border: 1px solid #e07373; }
        .badge.neutral { background: #3a3a52; color: #b9a88c; border: 1px solid #b9a88c; }

        .svg-container {
            width: 100%;
            height: 140px;
            background: #101018;
            border-radius: 4px;
            border: 1px solid #2a2a3c;
            margin-bottom: 1rem;
            position: relative;
            background-image: linear-gradient(rgba(120,120,150,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(120,120,150,0.1) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* SVG Animasi */
        .trend-line {
            stroke: #5a5a7a;
            stroke-width: 2;
            stroke-dasharray: 4, 4;
            fill: none;
        }
        
        .price-action {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0px 0px 4px currentcolor);
            transition: stroke-dashoffset 1.5s ease-in-out;
        }

        .price-action.bullish-path { stroke: #6c9; color: #6c9; }
        .price-action.bearish-path { stroke: #e07373; color: #e07373; }
        .price-action.neutral-path { stroke: #cfba8c; color: #cfba8c; }

        /* Deskripsi */
        .pattern-desc {
            font-size: 0.75rem;
            color: #b0b0c0;
            line-height: 1.5;
        }

        /* Animasi sinyal scanline di dalam chart */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(207, 186, 140, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pattern-card:hover .scanline {
            opacity: 1;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>PATTERN VAULT</h1>
        <p class="subtitle">> DECRYPTING PRICE ACTION <</p>

        <div class="tabs">
            <button class="tab-btn active" data-filter="all">SEMUA</button>
            <button class="tab-btn" data-filter="reversal">REVERSAL</button>
            <button class="tab-btn" data-filter="continuation">CONTINUATION</button>
            <button class="tab-btn" data-filter="bilateral">BILATERAL</button>
        </div>

        <div class="grid-container" id="pattern-grid">
            </div>
    </div>

    <script>
        // Database Pola Chart
        const patterns = [
            {
                name: 'Double Top',
                type: 'reversal',
                bias: 'bearish',
                desc: 'Pola pembalikan tren naik menjadi turun. Terdapat dua puncak di level resisten yang sama sebelum harga menjebol level neckline.',
                svg: `
                    <path class="trend-line" d="M 20 60 L 80 60" />
                    <path class="price-action bearish-path" d="M 10 90 L 30 20 L 50 60 L 70 20 L 90 90" />
                `
            },
            {
                name: 'Double Bottom',
                type: 'reversal',
                bias: 'bullish',
                desc: 'Pola pembalikan tren turun menjadi naik. Terdapat dua lembah di level support yang sama sebelum harga menjebol level neckline ke atas.',
                svg: `
                    <path class="trend-line" d="M 20 40 L 80 40" />
                    <path class="price-action bullish-path" d="M 10 10 L 30 80 L 50 40 L 70 80 L 90 10" />
                `
            },
            {
                name: 'Head & Shoulders',
                type: 'reversal',
                bias: 'bearish',
                desc: 'Pola pembalikan bearish klasik. Memiliki puncak (bahu) kiri, puncak tertinggi (kepala), dan puncak (bahu) kanan yang lebih rendah.',
                svg: `
                    <path class="trend-line" d="M 20 65 L 80 65" />
                    <path class="price-action bearish-path" d="M 10 90 L 25 45 L 35 65 L 50 15 L 65 65 L 75 45 L 90 90" />
                `
            },
            {
                name: 'Inv. Head & Shoulders',
                type: 'reversal',
                bias: 'bullish',
                desc: 'Pola pembalikan bullish. Kebalikan dari H&S, mengindikasikan tekanan jual mereda dan buyer mulai mengambil alih tren.',
                svg: `
                    <path class="trend-line" d="M 20 35 L 80 35" />
                    <path class="price-action bullish-path" d="M 10 10 L 25 55 L 35 35 L 50 85 L 65 35 L 75 55 L 90 10" />
                `
            },
            {
                name: 'Bullish Flag',
                type: 'continuation',
                bias: 'bullish',
                desc: 'Terjadi setelah kenaikan impulsif (tiang). Harga konsolidasi sejenak ke arah bawah sebelum melanjutkan tren kenaikan yang kuat.',
                svg: `
                    <path class="trend-line" d="M 35 25 L 65 40" />
                    <path class="trend-line" d="M 45 60 L 75 75" />
                    <path class="price-action bullish-path" d="M 10 90 L 40 20 L 50 55 L 60 30 L 70 65 L 90 10" />
                `
            },
            {
                name: 'Bearish Flag',
                type: 'continuation',
                bias: 'bearish',
                desc: 'Konsolidasi naik yang lemah setelah penurunan harga tajam. Biasanya akan diikuti breakout ke bawah meneruskan tren turun.',
                svg: `
                    <path class="trend-line" d="M 35 75 L 65 60" />
                    <path class="trend-line" d="M 45 40 L 75 25" />
                    <path class="price-action bearish-path" d="M 10 10 L 40 80 L 50 45 L 60 70 L 70 35 L 90 90" />
                `
            },
            {
                name: 'Ascending Triangle',
                type: 'continuation',
                bias: 'bullish',
                desc: 'Resisten datar namun support semakin meninggi (Higher Lows). Menunjukkan tekanan buyer semakin kuat untuk menembus resisten.',
                svg: `
                    <path class="trend-line" d="M 20 25 L 80 25" />
                    <path class="trend-line" d="M 20 85 L 80 25" />
                    <path class="price-action bullish-path" d="M 10 90 L 35 25 L 45 60 L 60 25 L 70 35 L 90 10" />
                `
            },
            {
                name: 'Descending Triangle',
                type: 'continuation',
                bias: 'bearish',
                desc: 'Support mendatar dengan resisten yang semakin menurun (Lower Highs). Menunjukkan seller menekan harga untuk menembus support.',
                svg: `
                    <path class="trend-line" d="M 20 75 L 80 75" />
                    <path class="trend-line" d="M 20 15 L 80 75" />
                    <path class="price-action bearish-path" d="M 10 10 L 35 75 L 45 40 L 60 75 L 70 65 L 90 90" />
                `
            },
            {
                name: 'Symmetrical Triangle',
                type: 'bilateral',
                bias: 'neutral',
                desc: 'Konsolidasi dimana support naik dan resisten turun menyempit. Arah breakout menentukan tren selanjutnya (Bilateral).',
                svg: `
                    <path class="trend-line" d="M 20 15 L 80 50" />
                    <path class="trend-line" d="M 20 85 L 80 50" />
                    <path class="price-action neutral-path" d="M 10 90 L 30 25 L 45 65 L 60 35 L 70 55 L 90 20" />
                `
            }
        ];

        const grid = document.getElementById('pattern-grid');

        // Render fungsi
        function renderPatterns(filterType = 'all') {
            grid.innerHTML = '';
            
            const filtered = patterns.filter(p => filterType === 'all' || p.type === filterType);
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'pattern-card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="pattern-name">${p.name}</span>
                        <span class="badge ${p.bias}">${p.bias}</span>
                    </div>
                    <div class="svg-container">
                        <div class="scanline"></div>
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
                            ${p.svg}
                        </svg>
                    </div>
                    <p class="pattern-desc">${p.desc}</p>
                `;
                
                grid.appendChild(card);
            });

            // Set up animasi SVG saat dirender
            setupSvgAnimation();
        }

        // Trik JS untuk kalkulasi panjang path agar animasi gambar berjalan mulus
        function setupSvgAnimation() {
            const paths = document.querySelectorAll('.price-action');
            paths.forEach(path => {
                const length = path.getTotalLength();
                // Set initial state: garis disembunyikan
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                
                // Gunakan event listener di parent (kartu) untuk memicu animasi draw line
                const card = path.closest('.pattern-card');
                card.addEventListener('mouseenter', () => {
                    path.style.strokeDashoffset = '0';
                });
                card.addEventListener('mouseleave', () => {
                    // Reset saat mouse keluar
                    path.style.strokeDashoffset = length;
                });
            });
        }

        // Filter Event Listeners
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                // Hapus active state
                tabs.forEach(t => t.classList.remove('active'));
                // Tambah active ke tombol yg diklik
                e.target.classList.add('active');
                
                const filter = e.target.getAttribute('data-filter');
                renderPatterns(filter);
            });
        });

        // Initial Render
        renderPatterns();
    </script>
</body>
</html>
