<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes – CARTRIDGE VAULT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">
</head>
<body>
    <div class="container">
        <h1>📝 QUICK NOTES</h1>
        <p class="subtitle" style="text-align:center;">Simpan di browser</p>

        <form id="noteForm">
            <label for="noteInput">Catatan Baru:</label>
            <textarea id="noteInput" placeholder="Tulis sesuatu..."></textarea>
            <button type="button" onclick="addNote()">SIMPAN</button>
        </form>

        <ul class="notes-list" id="notesList"></ul>
    </div>

    <script>
        const STORAGE_KEY = 'cartridge_vault_notes';

        function loadNotes() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            const notes = loadNotes();
            list.innerHTML = '';
            notes.forEach((note, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${escapeHtml(note)}</span>
                    <button class="delete-btn" onclick="deleteNote(${index})">X</button>
                `;
                list.appendChild(li);
            });
        }

        function escapeHtml(text) {
            return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            if (text === '') return;
            const notes = loadNotes();
            notes.push(text);
            saveNotes(notes);
            input.value = '';
            renderNotes();
        }

        function deleteNote(index) {
            const notes = loadNotes();
            notes.splice(index, 1);
            saveNotes(notes);
            renderNotes();
        }

        renderNotes();
    </script>

    <footer>🛠️ CARTRIDGE VAULT</footer>
</body>
</html>
