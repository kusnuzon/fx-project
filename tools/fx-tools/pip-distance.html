<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pip Distance Tracker – CARTRIDGE VAULT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../data/css/retro-theme.css">
</head>
<body>
  <div class="container">
    <h1>📏 PIP DISTANCE</h1>
    <p style="text-align:center;">Ukur jarak antar harga dalam pip</p>

    <form id="distanceForm">
      <label>Pair</label>
      <select id="pair" onchange="updatePipSize()">
        <option value="EURUSD">EUR/USD</option>
        <option value="GBPUSD">GBP/USD</option>
        <option value="AUDUSD">AUD/USD</option>
        <option value="NZDUSD">NZD/USD</option>
        <option value="USDJPY">USD/JPY</option>
        <option value="USDCAD">USD/CAD</option>
        <option value="USDCHF">USD/CHF</option>
      </select>

      <label>Harga A</label>
      <input type="number" id="priceA" step="0.00001" placeholder="1.12345" required>

      <label>Harga B</label>
      <input type="number" id="priceB" step="0.00001" placeholder="1.12545" required>

      <button type="button" onclick="calcDistance()">UKUR JARAK</button>
    </form>

    <div id="result" class="result-box" style="display:none;">
      <div id="distanceValue"></div>
      <div id="distanceVisual" style="font-size:2rem; margin-top:0.5rem;"></div>
    </div>
  </div>

  <footer>🛠️ CARTRIDGE VAULT</footer>

  <script>
    function getPipSize(pair) {
      return pair.includes('JPY') ? 0.01 : 0.0001;
    }

    function updatePipSize() {
      // hanya untuk info, bisa dikosongkan
    }

    function calcDistance() {
      const pair = document.getElementById('pair').value;
      const priceA = parseFloat(document.getElementById('priceA').value);
      const priceB = parseFloat(document.getElementById('priceB').value);

      if (isNaN(priceA) || isNaN(priceB)) {
        alert('Masukkan kedua harga.');
        return;
      }

      const pipSize = getPipSize(pair);
      const diff = priceB - priceA;
      const pips = diff / pipSize;

      document.getElementById('result').style.display = 'block';
      document.getElementById('distanceValue').innerHTML = `
        <strong>Jarak:</strong> ${Math.abs(pips).toFixed(1)} pip<br>
        <span style="color:${pips >= 0 ? '#6c9' : '#e07373'};">${pips >= 0 ? '▲' : '▼'} ${pips.toFixed(1)} pip dari A ke B</span>
      `;

      // Visual sederhana
      const blocks = Math.min(Math.floor(Math.abs(pips) / 5), 20);
      const visualEl = document.getElementById('distanceVisual');
      if (pips > 0) {
        visualEl.innerHTML = '🟢'.repeat(blocks) || '▪️';
      } else if (pips < 0) {
        visualEl.innerHTML = '🔴'.repeat(blocks) || '▪️';
      } else {
        visualEl.innerHTML = '⚪';
      }
    }
  </script>
</body>
</html>
