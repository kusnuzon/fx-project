<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Pattern Cheatsheet - Cartridge Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* =============================================
           GLOBAL RETRO THEME
           ============================================= */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #101018;
            color: #cdcdd4;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(120,120,150,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120,120,150,0.07) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,200,0.4), transparent),
                radial-gradient(1px 1px at 85% 15%, rgba(200,220,255,0.35), transparent),
                radial-gradient(1.5px 1.5px at 40% 70%, rgba(220,200,255,0.3), transparent),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,180,0.4), transparent),
                radial-gradient(1.2px 1.2px at 25% 90%, rgba(180,220,255,0.25), transparent);
            background-size: 200px 200px;
            animation: driftStars 40s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 2rem auto;
            background: rgba(16, 16, 28, 0.9);
            backdrop-filter: blur(4px);
            border: 3px solid #5a5a7a;
            border-radius: 6px;
            box-shadow:
                0 0 0 4px #1a1a2e,
                0 0 0 8px #0a0a14,
                0 10px 30px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(0,0,0,0.5);
            padding: 2rem;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: #cfba8c;
            text-align: center;
            text-shadow: 2px 2px 0 #3b3224;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #7a7a95;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- CONTROLS: SEARCH & TABS --- */
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .search-box {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #1e1e2e;
            border: 2px solid #4b4b68;
            color: #cfba8c;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .search-box:focus {
            border-color: #cfba8c;
            background: #232336;
        }

        .search-box::placeholder {
            color: #5a5a7a;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #4b4b68;
        }

        .tab-btn {
            flex: 1;
            padding: 0.7rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            background: transparent;
            color: #7a7a95;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            outline: none;
        }

        .tab-btn.active {
            color: #cfba8c;
            border-bottom: 3px solid #cfba8c;
            background: rgba(207,186,140,0.08);
        }

        .tab-btn:hover:not(.active) { 
            color: #b9a88c; 
            background: rgba(255,255,255,0.02);
        }

        /* =============================================
           CHEATSHEET GRID & CARDS
           ============================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .pattern-card {
            background: #1e1e2e;
            border: 2px solid #3f3f5c;
            border-radius: 8px;
            padding: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: crosshair;
        }

        .pattern-card:hover {
            border-color: #cfba8c;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(207,186,140,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px dashed #4b4b68;
            padding-bottom: 0.5rem;
        }

        .pattern-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: #f0e6d2;
            line-height: 1.4;
        }

        .badge {
            font-size: 0.6rem;
            padding: 0.3rem 0.5rem;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge.bullish { background: #2a3a2a; color: #6c9; border: 1px solid #6c9; }
        .badge.bearish { background: #3a2a2a; color: #e07373; border: 1px solid #e07373; }
        .badge.neutral { background: #3a3a52; color: #b9a88c; border: 1px solid #b9a88c; }

        .svg-container {
            width: 100%;
            height: 150px;
            background: #101018;
            border-radius: 4px;
            border: 1px solid #2a2a3c;
            margin-bottom: 1rem;
            position: relative;
            background-image: linear-gradient(rgba(120,120,150,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(120,120,150,0.1) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* SVG Elements */
        .trend-line {
            stroke: #5a5a7a;
            stroke-width: 2;
            stroke-dasharray: 4, 4;
            fill: none;
        }
        
        .price-action {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0px 0px 5px currentcolor);
            transition: stroke-dashoffset 1.8s ease-in-out;
        }

        .price-action.bullish-path { stroke: #6c9; color: #6c9; }
        .price-action.bearish-path { stroke: #e07373; color: #e07373; }
        .price-action.neutral-path { stroke: #cfba8c; color: #cfba8c; }

        .pattern-desc {
            font-size: 0.75rem;
            color: #b0b0c0;
            line-height: 1.6;
        }

        /* Scanline Animation */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(207, 186, 140, 0.4);
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 10px rgba(207, 186, 140, 0.5);
        }

        .pattern-card:hover .scanline {
            opacity: 1;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            color: #e07373;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            line-height: 2;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .tab-btn { font-size: 0.45rem; padding: 0.5rem; }
            .pattern-name { font-size: 0.55rem; }
            .grid-container { grid-template-columns: 1fr; }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>ULTIMATE PATTERN VAULT</h1>
        <p class="subtitle">> DECRYPTING PRICE ACTION MATRIX <</p>

        <div class="controls-container">
            <input type="text" id="search-input" class="search-box" placeholder="> C:\Search_Pattern_Name...">
            
            <div class="tabs">
                <button class="tab-btn active" data-filter="all">SEMUA</button>
                <button class="tab-btn" data-filter="reversal">REVERSAL</button>
                <button class="tab-btn" data-filter="continuation">CONTINUATION</button>
                <button class="tab-btn" data-filter="bilateral">BILATERAL</button>
            </div>
        </div>

        <div class="grid-container" id="pattern-grid">
            </div>
    </div>

    <script>
        // Database Ekstensif Pola Chart (19 Pola)
        const patterns = [
            // ================= REVERSAL =================
            {
                name: 'Double Top', type: 'reversal', bias: 'bearish',
                desc: 'Pola 'M'. Pembalikan tren naik. Dua puncak di level resisten yang sama. Entry sell saat harga jebol neckline ke bawah.',
                svg: `<path class="trend-line" d="M 20 60 L 80 60" /><path class="price-action bearish-path" d="M 10 90 L 30 20 L 50 60 L 70 20 L 90 90" />`
            },
            {
                name: 'Double Bottom', type: 'reversal', bias: 'bullish',
                desc: 'Pola 'W'. Pembalikan tren turun. Dua lembah di level support yang sama. Entry buy saat harga jebol neckline ke atas.',
                svg: `<path class="trend-line" d="M 20 40 L 80 40" /><path class="price-action bullish-path" d="M 10 10 L 30 80 L 50 40 L 70 80 L 90 10" />`
            },
            {
                name: 'Head & Shoulders', type: 'reversal', bias: 'bearish',
                desc: 'Puncak kiri (bahu), puncak tengah tertinggi (kepala), puncak kanan lebih rendah. Indikasi seller mengambil alih dominasi.',
                svg: `<path class="trend-line" d="M 15 65 L 85 65" /><path class="price-action bearish-path" d="M 5 90 L 25 45 L 35 65 L 50 15 L 65 65 L 75 45 L 95 90" />`
            },
            {
                name: 'Inv. Head & Shoulders', type: 'reversal', bias: 'bullish',
                desc: 'Kebalikan H&S. Terjadi di ujung downtrend. Menandakan tekanan jual habis dan buyer mulai mendominasi.',
                svg: `<path class="trend-line" d="M 15 35 L 85 35" /><path class="price-action bullish-path" d="M 5 10 L 25 55 L 35 35 L 50 85 L 65 35 L 75 55 L 95 10" />`
            },
            {
                name: 'Triple Top', type: 'reversal', bias: 'bearish',
                desc: 'Harga menguji level resisten sebanyak 3 kali namun gagal tembus. Mengindikasikan area supply yang sangat kuat.',
                svg: `<path class="trend-line" d="M 15 70 L 85 70" /><path class="price-action bearish-path" d="M 10 90 L 25 30 L 40 70 L 50 30 L 60 70 L 75 30 L 90 90" />`
            },
            {
                name: 'Triple Bottom', type: 'reversal', bias: 'bullish',
                desc: 'Harga menguji level support sebanyak 3 kali dan tertahan. Menunjukkan area demand yang solid untuk berbalik arah.',
                svg: `<path class="trend-line" d="M 15 30 L 85 30" /><path class="price-action bullish-path" d="M 10 10 L 25 70 L 40 30 L 50 70 L 60 30 L 75 70 L 90 10" />`
            },
            {
                name: 'Rising Wedge (Reversal)', type: 'reversal', bias: 'bearish',
                desc: 'Garis support dan resisten mengerucut ke atas. Menunjukkan momentum kenaikan melemah. Rentan breakout ke bawah.',
                svg: `<path class="trend-line" d="M 20 60 L 80 30" /><path class="trend-line" d="M 20 80 L 80 40" /><path class="price-action bearish-path" d="M 10 90 L 30 50 L 40 70 L 60 35 L 70 50 L 90 90" />`
            },
            {
                name: 'Falling Wedge (Reversal)', type: 'reversal', bias: 'bullish',
                desc: 'Garis support dan resisten mengerucut ke bawah di akhir downtrend. Momentum sell melemah, bersiap breakout naik.',
                svg: `<path class="trend-line" d="M 20 20 L 80 60" /><path class="trend-line" d="M 20 40 L 80 70" /><path class="price-action bullish-path" d="M 10 10 L 30 45 L 40 30 L 60 60 L 70 45 L 90 10" />`
            },

            // ================= CONTINUATION =================
            {
                name: 'Bullish Flag', type: 'continuation', bias: 'bullish',
                desc: 'Setelah rally naik (tiang), harga konsolidasi membentuk channel turun perlahan. Diikuti ledakan harga ke atas.',
                svg: `<path class="trend-line" d="M 35 25 L 65 40" /><path class="trend-line" d="M 45 60 L 75 75" /><path class="price-action bullish-path" d="M 10 90 L 40 20 L 50 55 L 60 30 L 70 65 L 90 10" />`
            },
            {
                name: 'Bearish Flag', type: 'continuation', bias: 'bearish',
                desc: 'Setelah drop tajam (tiang), harga koreksi membentuk channel naik perlahan. Biasanya akan tembus lanjut turun.',
                svg: `<path class="trend-line" d="M 35 75 L 65 60" /><path class="trend-line" d="M 45 40 L 75 25" /><path class="price-action bearish-path" d="M 10 10 L 40 80 L 50 45 L 60 70 L 70 35 L 90 90" />`
            },
            {
                name: 'Bullish Pennant', type: 'continuation', bias: 'bullish',
                desc: 'Mirip Flag, namun konsolidasinya mengerucut seperti segitiga simetris mini setelah pergerakan impulsif naik.',
                svg: `<path class="trend-line" d="M 40 30 L 70 45" /><path class="trend-line" d="M 40 60 L 70 45" /><path class="price-action bullish-path" d="M 10 90 L 40 20 L 50 50 L 60 35 L 90 10" />`
            },
            {
                name: 'Bearish Pennant', type: 'continuation', bias: 'bearish',
                desc: 'Konsolidasi mengerucut mini setelah penurunan impulsif. Sering disebut sebagai "jeda istirahat" sebelum harga anjlok lagi.',
                svg: `<path class="trend-line" d="M 40 40 L 70 55" /><path class="trend-line" d="M 40 70 L 70 55" /><path class="price-action bearish-path" d="M 10 10 L 40 80 L 50 50 L 60 65 L 90 90" />`
            },
            {
                name: 'Bullish Rectangle', type: 'continuation', bias: 'bullish',
                desc: 'Harga bergerak menyamping (sideways) dalam range paralel setelah uptrend. Mengumpulkan energi untuk lanjut naik.',
                svg: `<path class="trend-line" d="M 30 30 L 70 30" /><path class="trend-line" d="M 30 60 L 70 60" /><path class="price-action bullish-path" d="M 10 90 L 35 30 L 45 60 L 55 30 L 65 60 L 90 10" />`
            },
            {
                name: 'Bearish Rectangle', type: 'continuation', bias: 'bearish',
                desc: 'Harga sideways dalam range kotak setelah downtrend. Re-distribusi aset sebelum melanjutkan penurunan tajam.',
                svg: `<path class="trend-line" d="M 30 40 L 70 40" /><path class="trend-line" d="M 30 70 L 70 70" /><path class="price-action bearish-path" d="M 10 10 L 35 70 L 45 40 L 55 70 L 65 40 L 90 90" />`
            },
            {
                name: 'Cup & Handle', type: 'continuation', bias: 'bullish',
                desc: 'Pola mirip cangkir teh. Bentuk dasar membulat (U-shape) diikuti konsolidasi kecil (handle) sebelum breakout resisten.',
                svg: `<path class="trend-line" d="M 20 30 L 80 30" /><path class="price-action bullish-path" d="M 10 90 L 25 30 C 25 80, 55 80, 55 30 L 65 55 L 75 30 L 90 10" />`
            },

            // ================= BILATERAL / TRIANGLES =================
            {
                name: 'Ascending Triangle', type: 'bilateral', bias: 'bullish',
                desc: 'Atap datar (resisten kuat) namun lantai naik (Higher Lows). Umumnya bullish, namun berstatus bilateral jika terjadi anomali.',
                svg: `<path class="trend-line" d="M 20 25 L 80 25" /><path class="trend-line" d="M 20 85 L 80 25" /><path class="price-action bullish-path" d="M 10 90 L 35 25 L 45 60 L 60 25 L 70 35 L 90 10" />`
            },
            {
                name: 'Descending Triangle', type: 'bilateral', bias: 'bearish',
                desc: 'Lantai datar (support kuat) namun atap turun (Lower Highs). Umumnya bearish menembus support ke bawah.',
                svg: `<path class="trend-line" d="M 20 75 L 80 75" /><path class="trend-line" d="M 20 15 L 80 75" /><path class="price-action bearish-path" d="M 10 10 L 35 75 L 45 40 L 60 75 L 70 65 L 90 90" />`
            },
            {
                name: 'Symmetrical Triangle', type: 'bilateral', bias: 'neutral',
                desc: 'Resisten menurun dan support menanjak (menyempit secara simetris). Volatilitas mengecil. Arah breakout adalah kuncinya.',
                svg: `<path class="trend-line" d="M 20 15 L 80 50" /><path class="trend-line" d="M 20 85 L 80 50" /><path class="price-action neutral-path" d="M 10 90 L 30 25 L 45 65 L 60 35 L 70 55 L 90 20" />`
            },
            {
                name: 'Broadening Wedge', type: 'bilateral', bias: 'neutral',
                desc: 'Pola Megaphone. Support dan resisten makin melebar. Volatilitas sangat tinggi dan liar. Sulit ditradingkan sebelum valid breakout.',
                svg: `<path class="trend-line" d="M 30 40 L 90 15" /><path class="trend-line" d="M 30 60 L 90 85" /><path class="price-action neutral-path" d="M 10 50 L 35 45 L 45 60 L 60 30 L 75 75 L 90 15" />`
            }
        ];

        const grid = document.getElementById('pattern-grid');
        const searchInput = document.getElementById('search-input');
        const tabs = document.querySelectorAll('.tab-btn');
        
        let currentFilter = 'all';
        let searchQuery = '';

        // Fungsi Render Utama
        function renderPatterns() {
            grid.innerHTML = '';
            
            const filtered = patterns.filter(p => {
                const matchCategory = currentFilter === 'all' || p.type === currentFilter;
                const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                    p.desc.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">> ERROR: PATTERN [${searchQuery}] NOT FOUND IN DATABASE. <</div>`;
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'pattern-card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="pattern-name">${p.name}</span>
                        <span class="badge ${p.bias}">${p.bias}</span>
                    </div>
                    <div class="svg-container">
                        <div class="scanline"></div>
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
                            ${p.svg}
                        </svg>
                    </div>
                    <p class="pattern-desc">${p.desc}</p>
                `;
                grid.appendChild(card);
            });

            setupSvgAnimation();
        }

        // Setup Animasi SVG (Hanya digambar saat di-hover)
        function setupSvgAnimation() {
            const paths = document.querySelectorAll('.price-action');
            paths.forEach(path => {
                const length = path.getTotalLength();
                // Set kondisi awal (tak terlihat)
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                
                const card = path.closest('.pattern-card');
                
                // Memicu animasi jalan saat mouse masuk
                card.addEventListener('mouseenter', () => {
                    path.style.strokeDashoffset = '0';
                });
                
                // Mereset animasi saat mouse keluar
                card.addEventListener('mouseleave', () => {
                    path.style.strokeDashoffset = length;
                });
            });
        }

        // Event Listener untuk Search Box
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPatterns();
        });

        // Event Listener untuk Tabs Kategori
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                
                currentFilter = e.target.getAttribute('data-filter');
                renderPatterns();
            });
        });

        // Eksekusi Render Pertama Kali
        renderPatterns();
    </script>
</body>
</html>
