<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NES Emulator – CARTRIDGE VAULT</title>

    <!-- Global Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <!-- Nostalgist.js, JSZip, GamepadZilla -->
    <script src="https://unpkg.com/nostalgist"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gamepadzilla@1/dist/gamepadzilla.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎮 NES EMULATOR</h1>
        <p class="subtitle" style="text-align:center;">Drop .nes / .zip ROM</p>

        <div class="nes-dropzone" id="dropZone">
            ⬇️ Drop .nes / .zip file here<br>
            <span style="font-size:0.4rem;">or click to select</span>
        </div>

        <div class="nes-controls" id="controls" style="display:none;">
            <button onclick="nesEmulator.stop()">⏹️ STOP</button>
            <button onclick="nesEmulator.reset()">🔄 RESET</button>
            <button class="fullscreen-btn" onclick="nesEmulator.toggleFullscreen()">📺 FULLSCREEN</button>
        </div>

        <div id="emulatorWrapper" class="nes-emulator-wrapper"></div>
        <div class="nes-status" id="statusText"></div>
    </div>

    <script>
        const nesEmulator = {
            nostalgist: null,
            loaded: false,
            isFullscreen: false,

            async loadROM(romData, fileName) {
                this.stop();
                document.getElementById('statusText').textContent = 'Loading...';
                try {
                    if (this.nostalgist) { try { this.nostalgist.exit(); } catch(e) {} }

                    const romBlob = new Blob([romData], {type:'application/octet-stream'});
                    const romFile = new File([romBlob], fileName || 'game.nes');
                    this.nostalgist = await Nostalgist.nes(romFile);
                    const canvas = this.nostalgist.getCanvas();
                    canvas.classList.add('nes-emulator-canvas');

                    this.buildUI(canvas);
                    this.loaded = true;
                    document.getElementById('controls').style.display = 'flex';
                } catch(e) {
                    document.getElementById('statusText').textContent = 'Error: ' + e.message;
                }
            },

            buildUI(canvas) {
                const wrapper = document.getElementById('emulatorWrapper');
                wrapper.innerHTML = '';

                const container = document.createElement('div');
                container.id = 'emuContainer';
                container.appendChild(canvas);

                // Virtual Gamepad
                const gamepadDiv = document.createElement('div');
                gamepadDiv.className = 'virtual-gamepad';
                gamepadDiv.innerHTML = `
                    <div class="gamepad-container">
                        <canvas class="gpz-dpad" data-gpz-bind="ArrowUp ArrowLeft ArrowDown ArrowRight"></canvas>
                        <div class="action-buttons">
                            <canvas class="gpz-btn" data-gpz-bind="KeyX"></canvas>
                            <canvas class="gpz-btn" data-gpz-bind="KeyZ"></canvas>
                        </div>
                        <div class="start-select">
                            <canvas class="gpz-btn" data-gpz-bind="Enter"></canvas>
                            <canvas class="gpz-btn" data-gpz-bind="ShiftLeft"></canvas>
                        </div>
                    </div>
                `;
                container.appendChild(gamepadDiv);
                wrapper.appendChild(container);

                this.applyLayout();
                window.addEventListener('resize', () => this.applyLayout());
            },

            applyLayout() {
                const container = document.getElementById('emuContainer');
                if (!container) return;
                const isPortrait = window.innerHeight > window.innerWidth;
                container.className = isPortrait ? 'emu-portrait' : 'emu-landscape';
            },

            toggleFullscreen() {
                const wrapper = document.getElementById('emulatorWrapper');
                if (!this.isFullscreen) {
                    if (wrapper.requestFullscreen) {
                        wrapper.requestFullscreen();
                    } else if (wrapper.webkitRequestFullscreen) {
                        wrapper.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            },

            stop() {
                document.getElementById('emulatorWrapper').innerHTML = '';
                document.getElementById('controls').style.display = 'none';
                document.getElementById('statusText').textContent = 'Stopped.';
                this.loaded = false;
                if (this.nostalgist) { try { this.nostalgist.exit(); } catch(e) {} }
            },

            reset() {
                if (this.nostalgist) { try { this.nostalgist.restart(); } catch(e) {} }
                document.getElementById('statusText').textContent = 'Reset.';
            }
        };

        // ── Drag & Drop / Click ──
        (function() {
            const drop = document.getElementById('dropZone');
            drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
            drop.addEventListener('dragleave', e => { drop.classList.remove('drag-over'); });
            drop.addEventListener('drop', e => {
                e.preventDefault(); drop.classList.remove('drag-over');
                if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
            });
            drop.addEventListener('click', () => {
                const inp = document.createElement('input'); inp.type='file'; inp.accept='.nes,.zip';
                inp.onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };
                inp.click();
            });
        })();

        async function handleFile(file) {
            const status = document.getElementById('statusText');
            status.textContent = 'Processing...';
            try {
                const buf = await file.arrayBuffer();
                let data, name;
                if (file.name.toLowerCase().endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(buf);
                    const nFile = Object.keys(zip.files).find(f=>f.toLowerCase().endsWith('.nes'));
                    if (!nFile) throw new Error('No .nes in zip');
                    data = await zip.files[nFile].async('uint8array');
                    name = nFile;
                } else {
                    data = new Uint8Array(buf);
                    name = file.name;
                }
                await nesEmulator.loadROM(data, name);
            } catch(e) { status.textContent = 'Error: '+e.message; }
        }

        // Deteksi fullscreen exit
        document.addEventListener('fullscreenchange', () => {
            nesEmulator.isFullscreen = !!document.fullscreenElement;
        });
        document.addEventListener('webkitfullscreenchange', () => {
            nesEmulator.isFullscreen = !!document.webkitFullscreenElement;
        });
    </script>
</body>
</html>
