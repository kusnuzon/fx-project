<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTRIDGE VAULT</title>

    <!-- Google Pixel Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- Global Retro Theme -->
    <link rel="stylesheet" href="data/css/retro-theme.css">

    <style>
        /* ===== DASHBOARD SPECIFIC – CLEAN RETRO PIXEL ===== */
        .dashboard-container {
            position: relative;
            z-index: 2;
            max-width: 860px;
            margin: 2rem auto;
            background: rgba(18, 18, 30, 0.9);
            backdrop-filter: blur(4px);
            border: 4px solid #6e6e8a;
            outline: 4px solid #3d3d56;
            outline-offset: 6px;
            box-shadow:
                0 0 0 4px #1e1e2f,
                0 0 0 8px #0a0a14,
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 0 30px rgba(0,0,0,0.4);
            padding: 2rem 2rem 1.5rem;
            border-radius: 4px;
        }

        /* Scanline halus – lebih transparan */
        .dashboard-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.03) 0px,
                rgba(0,0,0,0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
        }
        .dashboard-container > * {
            position: relative;
            z-index: 20;
        }

        /* Header dengan animasi SVG cartridge */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 0 8px rgba(207,186,140,0.5));
            animation: floatCartridge 3s ease-in-out infinite;
        }

        @keyframes floatCartridge {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 2rem;
            color: #cfba8c;
            text-shadow: 2px 2px 0 #4a3e2c, 4px 4px 0 rgba(0,0,0,0.4);
            margin: 0.8rem 0 0.2rem;
            animation: softGlow 3s ease-in-out infinite;
            text-align: center;
        }

        @keyframes softGlow {
            0%, 100% { text-shadow: 2px 2px 0 #4a3e2c, 4px 4px 0 rgba(0,0,0,0.4), 0 0 6px rgba(207,186,140,0.2); }
            50%      { text-shadow: 2px 2px 0 #4a3e2c, 4px 4px 0 rgba(0,0,0,0.4), 0 0 14px rgba(207,186,140,0.35); }
        }

        .subtitle {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            color: #8e8ea0;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Categories – sekarang dengan tree toggle */
        .category {
            margin-bottom: 1.5rem;
        }

        /* Header kategori: judul + tombol toggle */
        .category-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
            padding: 0.3rem 0;
            margin-bottom: 0.5rem;
            border-bottom: 2px solid #4d4d6e;
            transition: border-color 0.15s;
        }
        .category-header:hover {
            border-bottom-color: #8a8aaa;
        }
        .category-header:hover .category-title {
            color: #cfba8c;
        }

        .category-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #9da5b4;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            flex: 1;
            border-bottom: none;
            padding-bottom: 0;
            display: inline;
            transition: color 0.15s;
        }

        /* Tombol toggle – panah kecil */
        .toggle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            color: #8e8ea0;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.25s ease, color 0.15s;
            padding: 0;
            font-family: 'Press Start 2P', cursive;
            line-height: 1;
        }
        .toggle-btn:hover {
            color: #cfba8c;
        }

        /* Saat kategori terbuka (expanded), panah menghadap bawah */
        .category.expanded .toggle-btn {
            transform: rotate(0deg);
        }
        /* Saat kategori tertutup (collapsed), panah menghadap kanan */
        .category.collapsed .toggle-btn {
            transform: rotate(-90deg);
        }

        /* Konten kategori – animasi buka/tutup */
        .category-content {
            overflow: hidden;
            max-height: 2000px;
            opacity: 1;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.3s ease,
                        margin 0.3s ease;
            margin-top: 0.5rem;
        }
        .category.collapsed .category-content {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            margin-bottom: 0;
        }

        /* Grid cartridge */
        .tool-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .tool-list li a {
            display: block;
            background: #2a2a3c;
            color: #d1d1db;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 0.9rem 1rem;
            text-align: center;
            border: 2px solid #4e4e68;
            box-shadow: 2px 2px 0 #0e0e1a, inset 0 0 0 2px #202030;
            transition: all 0.1s ease;
            position: relative;
        }

        .tool-list li a:hover {
            background: #4b4a6e;
            border-color: #b9a88c;
            color: #f0e6d2;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 #0a0a14, inset 0 0 0 2px #3b3b52;
        }

        .tool-list li a[target="_blank"]::after {
            content: " ↗";
            font-size: 0.7em;
            opacity: 0.6;
        }

        .empty-folder {
            color: #6b6b80;
            font-style: italic;
            font-size: 0.8rem;
            padding-left: 0.5rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: #9a9ab0;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            padding: 2rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .error {
            background: #2a1a1a;
            color: #dbb0b0;
            padding: 1rem;
            border: 2px solid #a05050;
            font-size: 0.8rem;
            margin: 1rem 0;
        }

        /* Badge jumlah item */
        .item-count {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.45rem;
            color: #7a7a95;
            margin-left: auto;
            background: #202030;
            padding: 0.15rem 0.4rem;
            border: 1px solid #3d3d56;
            border-radius: 2px;
        }

        /* Footer */
        .dashboard-footer {
            margin-top: 2rem;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.45rem;
            color: #5e5e78;
            position: relative;
        }
        .dashboard-footer::after {
            content: "▶ PRESS START ▼";
            display: block;
            animation: flickerFooter 2.5s infinite;
        }

        @keyframes flickerFooter {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.2; }
        }

        /* Responsif */
        @media (max-width: 600px) {
            .dashboard-container {
                padding: 1.2rem;
                border-width: 3px;
                outline-width: 3px;
                outline-offset: 3px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .tool-list {
                grid-template-columns: 1fr;
            }
            .category-header {
                flex-wrap: wrap;
            }
            .item-count {
                font-size: 0.4rem;
                padding: 0.1rem 0.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <!-- SVG Cartridge Retro Animasi -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="15" width="60" height="70" rx="4" fill="#2a2a3c" stroke="#cfba8c" stroke-width="3"/>
                <rect x="30" y="25" width="40" height="10" rx="2" fill="#4b4b6e"/>
                <rect x="35" y="40" width="30" height="8" rx="1" fill="#6e6e8a"/>
                <rect x="35" y="52" width="30" height="8" rx="1" fill="#6e6e8a"/>
                <rect x="35" y="64" width="30" height="8" rx="1" fill="#6e6e8a"/>
                <circle cx="50" cy="85" r="5" fill="#cfba8c"/>
                <path d="M 20 25 L 10 25 L 10 75 L 20 75" fill="none" stroke="#cfba8c" stroke-width="2"/>
                <path d="M 80 25 L 90 25 L 90 75 L 80 75" fill="none" stroke="#cfba8c" stroke-width="2"/>
            </svg>
        </div>
        <h1>CARTRIDGE VAULT</h1>
        <p class="subtitle">Insert cartridge inside <code>tools/</code></p>

        <div id="tools-container">
            <div class="loading">> SCANNING CARTRIDGES...</div>
        </div>

        <div class="dashboard-footer"></div>
    </div>

    <script>
        (async function() {
            const GITHUB_USERNAME = 'kusnuzon';
            const REPO_NAME      = 'fx-project';
            const TOOLS_PARENT_FOLDER = 'tools';
            const STORAGE_KEY_PREFIX = 'cartridge_vault_collapsed_';

            const container = document.getElementById('tools-container');

            // Baca state collapse dari localStorage
            function getCollapsedState(categoryName) {
                try {
                    const val = localStorage.getItem(STORAGE_KEY_PREFIX + categoryName);
                    return val === 'true';
                } catch (e) {
                    return false;
                }
            }

            function setCollapsedState(categoryName, collapsed) {
                try {
                    localStorage.setItem(STORAGE_KEY_PREFIX + categoryName, collapsed ? 'true' : 'false');
                } catch (e) {
                    // localStorage tidak tersedia atau penuh
                }
            }

            function createCategoryElement(categoryName, toolsCount, contentHtml, isCollapsed) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category' + (isCollapsed ? ' collapsed' : ' expanded');
                categoryDiv.setAttribute('data-category', categoryName);

                // Header
                const header = document.createElement('div');
                header.className = 'category-header';
                header.setAttribute('role', 'button');
                header.setAttribute('tabindex', '0');
                header.setAttribute('aria-expanded', isCollapsed ? 'false' : 'true');

                // Toggle button (panah)
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'toggle-btn';
                toggleBtn.setAttribute('aria-label', isCollapsed ? 'Expand category' : 'Collapse category');
                toggleBtn.innerHTML = '&#9660;'; // ▼
                toggleBtn.type = 'button';

                // Judul
                const title = document.createElement('h2');
                title.className = 'category-title';
                title.textContent = categoryName;

                // Badge jumlah
                const badge = document.createElement('span');
                badge.className = 'item-count';
                badge.textContent = toolsCount + (toolsCount === 1 ? ' tool' : ' tools');

                // Susun header
                header.appendChild(toggleBtn);
                header.appendChild(title);
                header.appendChild(badge);

                // Konten
                const content = document.createElement('div');
                content.className = 'category-content';
                content.innerHTML = contentHtml;

                // Gabungkan
                categoryDiv.appendChild(header);
                categoryDiv.appendChild(content);

                // Event listener toggle
                header.addEventListener('click', function(e) {
                    // Jangan toggle jika klik pada link di dalam header (tidak ada, tapi jaga-jaga)
                    if (e.target.tagName === 'A') return;

                    const cat = categoryDiv;
                    const isCurrentlyCollapsed = cat.classList.contains('collapsed');
                    const catName = cat.getAttribute('data-category');

                    if (isCurrentlyCollapsed) {
                        // Buka
                        cat.classList.remove('collapsed');
                        cat.classList.add('expanded');
                        header.setAttribute('aria-expanded', 'true');
                        toggleBtn.setAttribute('aria-label', 'Collapse category');
                        setCollapsedState(catName, false);
                    } else {
                        // Tutup
                        cat.classList.remove('expanded');
                        cat.classList.add('collapsed');
                        header.setAttribute('aria-expanded', 'false');
                        toggleBtn.setAttribute('aria-label', 'Expand category');
                        setCollapsedState(catName, true);
                    }
                });

                // Keyboard support (Enter / Space)
                header.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        header.click();
                    }
                });

                return categoryDiv;
            }

            try {
                const parentApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}`;
                const parentResponse = await fetch(parentApiUrl);
                if (!parentResponse.ok) throw new Error(`Folder "${TOOLS_PARENT_FOLDER}" not found.`);

                const parentItems = await parentResponse.json();
                const categories = parentItems.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                if (categories.length === 0) {
                    container.innerHTML = `<div class="loading">No categories inside ${TOOLS_PARENT_FOLDER}/</div>`;
                    return;
                }

                const categoryPromises = categories.map(async folder => {
                    const folderApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}/${folder.name}`;
                    const folderResponse = await fetch(folderApiUrl);
                    if (!folderResponse.ok) return { category: folder.name, tools: [] };

                    const files = await folderResponse.json();
                    const htmlFiles = files.filter(file =>
                        file.type === 'file' &&
                        file.name.endsWith('.html') &&
                        !['index.html', '404.html'].includes(file.name)
                    );
                    return { category: folder.name, tools: htmlFiles };
                });

                const categoryResults = await Promise.all(categoryPromises);

                container.innerHTML = '';

                categoryResults.forEach(({ category, tools }) => {
                    const displayName = category.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

                    let contentHtml = '';

                    if (tools.length === 0) {
                        contentHtml = '<p class="empty-folder">- No cartridges yet -</p>';
                    } else {
                        let listItemsHtml = '';
                        tools.forEach(file => {
                            const rawName = file.name.replace('.html', '');
                            const toolName = rawName.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                            const href = `${TOOLS_PARENT_FOLDER}/${category}/${file.name}`;
                            listItemsHtml += `<li><a href="${href}" target="_blank" rel="noopener noreferrer">${toolName}</a></li>`;
                        });
                        contentHtml = `<ul class="tool-list">${listItemsHtml}</ul>`;
                    }

                    // Ambil state collapse dari localStorage
                    const isCollapsed = getCollapsedState(category);

                    const categoryEl = createCategoryElement(
                        displayName,
                        tools.length,
                        contentHtml,
                        isCollapsed
                    );

                    container.appendChild(categoryEl);
                });

            } catch (error) {
                container.innerHTML = `<div class="error">⚠️ ${error.message}</div>`;
                console.error(error);
            }
        })();
    </script>
</body>
</html>
