<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .category {
            margin-bottom: 2rem;
        }
        .category-title {
            font-size: 1.5rem;
            color: #4a5568;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .tool-list {
            list-style: none;
            display: grid;
            gap: 0.75rem;
        }
        .tool-list li a {
            display: block;
            background: #edf2f7;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            color: #2b6cb0;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .tool-list li a:hover {
            background: #bee3f8;
            border-color: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49,130,206,0.2);
        }
        .loading {
            text-align: center;
            color: #a0aec0;
            padding: 2rem;
        }
        .error {
            background: #fff5f5;
            color: #c53030;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #fc8181;
            margin-bottom: 1rem;
        }
        .empty-folder {
            color: #a0aec0;
            font-style: italic;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠 Tool Dashboard</h1>
        <p class="subtitle">All tools organized by folder – inside <code>Tools/</code></p>
        <div id="tools-container">
            <div class="loading">🔍 Scanning <code>Tools/</code> for categories...</div>
        </div>
        <div class="footer">
            <span>Add a new subfolder inside <code>Tools/</code> with HTML files, push, and it shows up here.</span>
        </div>
    </div>

    <script>
        (async function() {
            // ── CONFIGURATION ──
            const GITHUB_USERNAME = 'kusnuzon';
            const REPO_NAME      = 'fx-project';

            // The folder that contains all tool subfolders.
            // Change this if your container folder has a different name.
            const TOOLS_PARENT_FOLDER = 'Tools';

            const container = document.getElementById('tools-container');

            try {
                // 1. Fetch the contents of the container folder
                const parentApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}`;
                const parentResponse = await fetch(parentApiUrl);

                if (!parentResponse.ok) {
                    throw new Error(`Folder "${TOOLS_PARENT_FOLDER}" not found or repo is private (status ${parentResponse.status}).`);
                }

                const parentItems = await parentResponse.json();

                // 2. Filter only subdirectories (ignore files, hidden folders, etc.)
                const categories = parentItems.filter(item =>
                    item.type === 'dir' && !item.name.startsWith('.')
                );

                if (categories.length === 0) {
                    container.innerHTML = `<p class="loading">No tool categories found inside <code>${TOOLS_PARENT_FOLDER}/</code>. Create subfolders like <code>any-tools</code> with HTML files inside.</p>`;
                    return;
                }

                // 3. For each category folder, fetch its contents in parallel
                const categoryPromises = categories.map(async folder => {
                    const folderApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}/${folder.name}`;
                    const folderResponse = await fetch(folderApiUrl);
                    if (!folderResponse.ok) return { category: folder.name, tools: [] };

                    const files = await folderResponse.json();
                    // Only keep .html files (exclude index.html, 404.html)
                    const htmlFiles = files.filter(file =>
                        file.type === 'file' &&
                        file.name.endsWith('.html') &&
                        !['index.html', '404.html'].includes(file.name)
                    );
                    return { category: folder.name, tools: htmlFiles };
                });

                const categoryResults = await Promise.all(categoryPromises);

                // 4. Build the UI
                container.innerHTML = '';

                categoryResults.forEach(({ category, tools }) => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';

                    // Beautify category name for display
                    const displayName = category
                        .replace(/[-_]/g, ' ')
                        .replace(/\b\w/g, char => char.toUpperCase());

                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = displayName;
                    categoryDiv.appendChild(title);

                    if (tools.length === 0) {
                        const empty = document.createElement('p');
                        empty.className = 'empty-folder';
                        empty.textContent = 'No HTML tools in this category yet.';
                        categoryDiv.appendChild(empty);
                    } else {
                        const list = document.createElement('ul');
                        list.className = 'tool-list';

                        tools.forEach(file => {
                            const rawName = file.name.replace('.html', '');
                            const toolName = rawName
                                .replace(/[-_]/g, ' ')
                                .replace(/\b\w/g, char => char.toUpperCase());

                            const li = document.createElement('li');
                            const link = document.createElement('a');
                            // Relative path from root: Tools/category/filename.html
                            link.href = `${TOOLS_PARENT_FOLDER}/${category}/${file.name}`;
                            link.textContent = toolName;
                            li.appendChild(link);
                            list.appendChild(li);
                        });

                        categoryDiv.appendChild(list);
                    }

                    container.appendChild(categoryDiv);
                });

            } catch (error) {
                container.innerHTML = `<div class="error">⚠️ ${error.message}</div>`;
                console.error(error);
            }
        })();
    </script>
</body>
</html>
