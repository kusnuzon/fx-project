<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Overworld BGM | Cartridge Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <style>
        .mario-wrapper {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 2rem auto;
            background: rgba(12, 12, 24, 0.95);
            border: 4px solid #e64300;
            outline: 4px solid #3d3d56;
            outline-offset: 6px;
            box-shadow:
                0 0 0 4px #1e1e2f,
                0 0 0 8px #0a0a14,
                0 10px 30px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(0,0,0,0.4);
            padding: 1.5rem;
            border-radius: 4px;
            text-align: center;
        }
        .mario-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.06) 0px,
                rgba(0,0,0,0.06) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
        }
        .mario-wrapper > * { position: relative; z-index: 20; }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            color: #f0e6d2;
            margin-bottom: 0.3rem;
            text-shadow: 2px 2px 0 #4a3e2c;
        }

        .track-info {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            color: #9da5b4;
            margin-bottom: 1rem;
        }

        .oscilloscope {
            width: 100%;
            height: 100px;
            background: #0a0a14;
            border: 2px solid #4b4b68;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
        }
        canvas#oscCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .mario-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 0.7rem 1.5rem;
            background: #2a2a3c;
            border: 2px solid #e64300;
            color: #f0e6d2;
            cursor: pointer;
            box-shadow: 3px 3px 0 #4a3e2c;
            transition: all 0.05s;
            text-transform: uppercase;
        }
        .mario-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #4a3e2c;
        }
        .mario-btn.active {
            background: #e64300;
            border-color: #f0e6d2;
            color: #fff;
            box-shadow: 0 0 10px rgba(230,67,0,0.5);
        }
    </style>
</head>
<body>
    <div class="mario-wrapper">
        <h2>🍄 MARIO OVERWORLD</h2>
        <div class="track-info">FULL TRACK LOOP · ACCURATE MELODY</div>

        <div class="oscilloscope">
            <canvas id="oscCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="mario-btn" id="playBtn">▶ PLAY</button>
            <button class="mario-btn" id="stopBtn">⏹ STOP</button>
        </div>
        <p style="font-family:'Press Start 2P',cursive;font-size:0.4rem;color:#5e5e78;margin-top:0.8rem;">
            TEMPO 200 · PULSE + TRI + NOISE
        </p>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById('oscCanvas');
            const ctx = canvas.getContext('2d');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');

            let audioCtx = null;
            let masterGain = null;
            let isPlaying = false;
            let schedulerTimer = null;
            let animFrameId = null;
            let currentOscillators = [];

            // ---------- NOTE FREQUENCIES ----------
            const NOTE = {
                REST: 0,
                C4: 262, CS4: 277, D4: 294, DS4: 311, E4: 330, F4: 349, FS4: 370,
                G4: 392, GS4: 415, A4: 440, AS4: 466, B4: 494,
                C5: 523, CS5: 554, D5: 587, DS5: 622, E5: 659, F5: 698, FS5: 740,
                G5: 784, GS5: 831, A5: 880, AS5: 932, B5: 988,
            };

            // ---------- MELODY FROM ARDUINO DATA ----------
            // Pasangan [freq, duration]
            // duration: 4=quarter, 8=eighth, -4=dotted quarter, -8=dotted eighth, 2=half
            const melody = [
                // Bar 1
                NOTE.E5,8, NOTE.E5,8, NOTE.REST,8, NOTE.E5,8, NOTE.REST,8, NOTE.C5,8, NOTE.E5,8,
                NOTE.G5,4, NOTE.REST,4, NOTE.G4,8, NOTE.REST,4,
                NOTE.C5,-4, NOTE.G4,8, NOTE.REST,4, NOTE.E4,-4,
                NOTE.A4,4, NOTE.B4,4, NOTE.AS4,8, NOTE.A4,4,
                NOTE.G4,-8, NOTE.E5,-8, NOTE.G5,-8, NOTE.A5,4, NOTE.F5,8, NOTE.G5,8,
                NOTE.REST,8, NOTE.E5,4, NOTE.C5,8, NOTE.D5,8, NOTE.B4,-4,
                // Pengulangan dari bar 3
                NOTE.C5,-4, NOTE.G4,8, NOTE.REST,4, NOTE.E4,-4,
                NOTE.A4,4, NOTE.B4,4, NOTE.AS4,8, NOTE.A4,4,
                NOTE.G4,-8, NOTE.E5,-8, NOTE.G5,-8, NOTE.A5,4, NOTE.F5,8, NOTE.G5,8,
                NOTE.REST,8, NOTE.E5,4, NOTE.C5,8, NOTE.D5,8, NOTE.B4,-4,
                // Bar 7
                NOTE.REST,4, NOTE.G5,8, NOTE.FS5,8, NOTE.F5,8, NOTE.DS5,4, NOTE.E5,8,
                NOTE.REST,8, NOTE.GS4,8, NOTE.A4,8, NOTE.C4,8, NOTE.REST,8, NOTE.A4,8, NOTE.C5,8, NOTE.D5,8,
                NOTE.REST,4, NOTE.DS5,4, NOTE.REST,8, NOTE.D5,-4,
                NOTE.C5,2, NOTE.REST,2,
                // Ulangi bar 7
                NOTE.REST,4, NOTE.G5,8, NOTE.FS5,8, NOTE.F5,8, NOTE.DS5,4, NOTE.E5,8,
                NOTE.REST,8, NOTE.GS4,8, NOTE.A4,8, NOTE.C4,8, NOTE.REST,8, NOTE.A4,8, NOTE.C5,8, NOTE.D5,8,
                NOTE.REST,4, NOTE.DS5,4, NOTE.REST,8, NOTE.D5,-4,
                NOTE.C5,2, NOTE.REST,2,
                // Bar 11
                NOTE.C5,8, NOTE.C5,4, NOTE.C5,8, NOTE.REST,8, NOTE.C5,8, NOTE.D5,4,
                NOTE.E5,8, NOTE.C5,4, NOTE.A4,8, NOTE.G4,2,
                // Bar 13
                NOTE.C5,8, NOTE.C5,4, NOTE.C5,8, NOTE.REST,8, NOTE.C5,8, NOTE.D5,8, NOTE.E5,8,
                NOTE.REST,1,
                NOTE.C5,8, NOTE.C5,4, NOTE.C5,8, NOTE.REST,8, NOTE.C5,8, NOTE.D5,4,
                NOTE.E5,8, NOTE.C5,4, NOTE.A4,8, NOTE.G4,2,
                NOTE.E5,8, NOTE.E5,8, NOTE.REST,8, NOTE.E5,8, NOTE.REST,8, NOTE.C5,8, NOTE.E5,4,
                NOTE.G5,4, NOTE.REST,4, NOTE.G4,4, NOTE.REST,4,
                // Bar 19
                NOTE.C5,-4, NOTE.G4,8, NOTE.REST,4, NOTE.E4,-4,
                NOTE.A4,4, NOTE.B4,4, NOTE.AS4,8, NOTE.A4,4,
                NOTE.G4,-8, NOTE.E5,-8, NOTE.G5,-8, NOTE.A5,4, NOTE.F5,8, NOTE.G5,8,
                NOTE.REST,8, NOTE.E5,4, NOTE.C5,8, NOTE.D5,8, NOTE.B4,-4,
                // Ulangi dari 19
                NOTE.C5,-4, NOTE.G4,8, NOTE.REST,4, NOTE.E4,-4,
                NOTE.A4,4, NOTE.B4,4, NOTE.AS4,8, NOTE.A4,4,
                NOTE.G4,-8, NOTE.E5,-8, NOTE.G5,-8, NOTE.A5,4, NOTE.F5,8, NOTE.G5,8,
                NOTE.REST,8, NOTE.E5,4, NOTE.C5,8, NOTE.D5,8, NOTE.B4,-4,
                // Bar 23
                NOTE.E5,8, NOTE.C5,4, NOTE.G4,8, NOTE.REST,4, NOTE.GS4,4,
                NOTE.A4,8, NOTE.F5,4, NOTE.F5,8, NOTE.A4,2,
                NOTE.D5,-8, NOTE.A5,-8, NOTE.A5,-8, NOTE.A5,-8, NOTE.G5,-8, NOTE.F5,-8,
                NOTE.E5,8, NOTE.C5,4, NOTE.A4,8, NOTE.G4,2,
                NOTE.E5,8, NOTE.C5,4, NOTE.G4,8, NOTE.REST,4, NOTE.GS4,4,
                NOTE.A4,8, NOTE.F5,4, NOTE.F5,8, NOTE.A4,2,
                NOTE.B4,8, NOTE.F5,4, NOTE.F5,8, NOTE.F5,-8, NOTE.E5,-8, NOTE.D5,-8,
                NOTE.C5,8, NOTE.E4,4, NOTE.E4,8, NOTE.C4,2,
                // Ulangi dari 23
                NOTE.E5,8, NOTE.C5,4, NOTE.G4,8, NOTE.REST,4, NOTE.GS4,4,
                NOTE.A4,8, NOTE.F5,4, NOTE.F5,8, NOTE.A4,2,
                NOTE.D5,-8, NOTE.A5,-8, NOTE.A5,-8, NOTE.A5,-8, NOTE.G5,-8, NOTE.F5,-8,
                NOTE.E5,8, NOTE.C5,4, NOTE.A4,8, NOTE.G4,2,
                NOTE.E5,8, NOTE.C5,4, NOTE.G4,8, NOTE.REST,4, NOTE.GS4,4,
                NOTE.A4,8, NOTE.F5,4, NOTE.F5,8, NOTE.A4,2,
                NOTE.B4,8, NOTE.F5,4, NOTE.F5,8, NOTE.F5,-8, NOTE.E5,-8, NOTE.D5,-8,
                NOTE.C5,8, NOTE.E4,4, NOTE.E4,8, NOTE.C4,2,
                // Bar 31
                NOTE.C5,8, NOTE.C5,4, NOTE.C5,8, NOTE.REST,8, NOTE.C5,8, NOTE.D5,8, NOTE.E5,8,
                NOTE.REST,1,
                NOTE.C5,8, NOTE.C5,4, NOTE.C5,8, NOTE.REST,8, NOTE.C5,8, NOTE.D5,4,
                NOTE.E5,8, NOTE.C5,4, NOTE.A4,8, NOTE.G4,2,
                NOTE.E5,8, NOTE.E5,8, NOTE.REST,8, NOTE.E5,8, NOTE.REST,8, NOTE.C5,8, NOTE.E5,4,
                NOTE.G5,4, NOTE.REST,4, NOTE.G4,4, NOTE.REST,4,
                NOTE.E5,8, NOTE.C5,4, NOTE.G4,8, NOTE.REST,4, NOTE.GS4,4,
                NOTE.A4,8, NOTE.F5,4, NOTE.F5,8, NOTE.A4,2,
                NOTE.D5,-8, NOTE.A5,-8, NOTE.A5,-8, NOTE.A5,-8, NOTE.G5,-8, NOTE.F5,-8,
                NOTE.E5,8, NOTE.C5,4, NOTE.A4,8, NOTE.G4,2,
                NOTE.E5,8, NOTE.C5,4, NOTE.G4,8, NOTE.REST,4, NOTE.GS4,4,
                NOTE.A4,8, NOTE.F5,4, NOTE.F5,8, NOTE.A4,2,
                NOTE.B4,8, NOTE.F5,4, NOTE.F5,8, NOTE.F5,-8, NOTE.E5,-8, NOTE.D5,-8,
                NOTE.C5,8, NOTE.E4,4, NOTE.E4,8, NOTE.C4,2,
            ];

            const TEMPO = 200;
            const wholenote = (60000 * 4) / TEMPO; // ms untuk whole note

            // ---------- BASS PATTERN SEDERHANA ----------
            // Bass line mengikuti harmoni dasar
            const bassLine = [
                NOTE.C3,4, NOTE.G2,4, NOTE.C3,4, NOTE.G2,4,
                NOTE.C3,4, NOTE.G2,4, NOTE.C3,4, NOTE.G2,4,
                NOTE.F3,4, NOTE.C3,4, NOTE.F3,4, NOTE.C3,4,
                NOTE.G3,4, NOTE.D3,4, NOTE.G3,4, NOTE.D3,4,
                NOTE.C3,4, NOTE.G2,4, NOTE.C3,4, NOTE.G2,4,
                NOTE.C3,4, NOTE.G2,4, NOTE.C3,4, NOTE.G2,4,
                NOTE.F3,4, NOTE.C3,4, NOTE.F3,4, NOTE.C3,4,
                NOTE.G3,4, NOTE.D3,4, NOTE.G3,4, NOTE.D3,4,
            ];

            // ---------- AUDIO FUNCTIONS ----------
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.12;
                    masterGain.connect(audioCtx.destination);
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function stopAllOsc() {
                currentOscillators.forEach(o => {
                    try { o.stop(); } catch(e) {}
                });
                currentOscillators = [];
            }

            function playNote(freq, type, startTime, durationSec) {
                if (!audioCtx || !masterGain || freq <= 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(type === 'square' ? 0.22 : 0.18, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + durationSec);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(startTime);
                osc.stop(startTime + durationSec);
                currentOscillators.push(osc);
            }

            function playNoise(startTime, durationSec) {
                if (!audioCtx || !masterGain) return;
                const bufferSize = Math.floor(audioCtx.sampleRate * durationSec);
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.15, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + durationSec);
                noise.connect(gainNode);
                gainNode.connect(masterGain);
                noise.start(startTime);
                noise.stop(startTime + durationSec);
                currentOscillators.push(noise);
            }

            // ---------- SCHEDULER ----------
            function scheduleFullTrack(startTime) {
                let currentTime = startTime;

                // Lead melody
                for (let i = 0; i < melody.length; i += 2) {
                    const freq = melody[i];
                    const divider = melody[i + 1];
                    let durationMs;
                    if (divider > 0) {
                        durationMs = wholenote / divider;
                    } else {
                        durationMs = (wholenote / Math.abs(divider)) * 1.5;
                    }
                    const durationSec = durationMs / 1000;
                    const playDuration = durationSec * 0.9;

                    if (freq > 0) {
                        playNote(freq, 'square', currentTime, playDuration);
                    }
                    currentTime += durationSec;
                }

                const totalDuration = currentTime - startTime;

                // Bass line (looping sederhana mengikuti harmoni)
                let bassTime = startTime;
                const bassNoteLen = (wholenote / 4) / 1000; // quarter note
                for (let i = 0; i < Math.ceil(totalDuration / bassNoteLen); i++) {
                    const bassFreq = bassLine[i % bassLine.length];
                    if (bassFreq > 0) {
                        playNote(bassFreq, 'triangle', bassTime, bassNoteLen * 0.9);
                    }
                    bassTime += bassNoteLen;
                }

                // Drum (noise) setiap 8th note
                const drumInterval = (wholenote / 8) / 1000;
                for (let t = startTime; t < startTime + totalDuration; t += drumInterval) {
                    playNoise(t, drumInterval * 0.6);
                }

                return totalDuration;
            }

            function nextLoop() {
                if (!isPlaying) return;
                const now = audioCtx.currentTime;
                const loopDur = scheduleFullTrack(now);
                // Bersihkan osilator yang sudah selesai
                currentOscillators = currentOscillators.filter(o => {
                    try { return o.playbackState !== 3; } catch(e) { return false; }
                });
                schedulerTimer = setTimeout(nextLoop, loopDur * 1000);
            }

            function startPlayback() {
                if (isPlaying) return;
                initAudio();
                stopPlayback();
                isPlaying = true;
                playBtn.classList.add('active');
                nextLoop();
                animateOscilloscope();
            }

            function stopPlayback() {
                if (schedulerTimer) {
                    clearTimeout(schedulerTimer);
                    schedulerTimer = null;
                }
                stopAllOsc();
                isPlaying = false;
                playBtn.classList.remove('active');
                if (animFrameId) cancelAnimationFrame(animFrameId);
            }

            // ---------- VISUAL ----------
            function drawOsc() {
                const w = canvas.width = canvas.clientWidth;
                const h = canvas.height = canvas.clientHeight;
                ctx.clearRect(0, 0, w, h);
                if (!isPlaying) {
                    ctx.strokeStyle = '#3f3f5c';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, h/2);
                    ctx.lineTo(w, h/2);
                    ctx.stroke();
                } else {
                    const now = Date.now() / 1000;
                    ctx.strokeStyle = '#e64300';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const center = h/2;
                    const amp = h * 0.4;
                    for (let x = 0; x < w; x++) {
                        const phase = (x / w) * 2 * Math.PI * 1.5 + now * 5;
                        const y = center + Math.sin(phase) * amp * 0.3;
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    ctx.strokeStyle = 'rgba(78,78,104,0.3)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < w; i += 8) {
                        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
                    }
                    for (let i = 0; i < h; i += 8) {
                        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
                    }
                }
            }

            function animateOscilloscope() {
                drawOsc();
                animFrameId = requestAnimationFrame(animateOscilloscope);
            }

            playBtn.addEventListener('click', startPlayback);
            stopBtn.addEventListener('click', stopPlayback);

            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            animateOscilloscope();

            window.addEventListener('beforeunload', () => {
                stopPlayback();
                if (audioCtx) audioCtx.close();
            });
        })();
    </script>
</body>
</html>
