<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Calendar & News – CARTRIDGE VAULT</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">
</head>
<body>
    <div class="container">
        <h1>📡 FX TERMINAL</h1>
        <p class="subtitle" style="text-align:center;">Calendar & News – Live Data</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('calendar')" id="tab-calendar">📅 Kalender</button>
            <button class="tab-btn" onclick="switchTab('news')" id="tab-news">📰 Berita</button>
        </div>

        <div id="view-calendar">
            <div class="filter-row">
                <label>Mata Uang:</label>
                <select id="filterCurrency" onchange="renderCalendar()">
                    <option value="ALL">ALL</option>
                </select>
                <label>Dampak:</label>
                <select id="filterImpact" onchange="renderCalendar()">
                    <option value="ALL">ALL</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                    <option value="Holiday">Holiday</option>
                </select>
                <label>Cari:</label>
                <input type="text" id="filterSearch" placeholder="Search event..." oninput="renderCalendar()">
                <label>Zona:</label>
                <select id="filterTz" onchange="renderCalendar()">
                    <option value="WIB">WIB (UTC+7)</option>
                    <option value="UTC">UTC</option>
                    <option value="local">Local</option>
                </select>
            </div>
            <div id="calendar-content"><div class="loading">Loading calendar...</div></div>
            <div id="calendar-status" style="text-align:center; margin-top:10px; font-size:0.65rem; color:#8a8a9a;"></div>
        </div>

        <div id="view-news" style="display:none;">
            <div class="filter-row">
                <label>Cari:</label>
                <input type="text" id="filterNewsSearch" placeholder="Search news..." oninput="renderNews()">
            </div>
            <div id="news-content"><div class="loading">Loading news...</div></div>
        </div>
    </div>

    <footer>🛠️ CARTRIDGE VAULT</footer>

    <script>
        let calendarData = [];
        let newsData = [];
        let isUsingMockData = false;

        const CALENDAR_URL = 'https://nfs.faireconomy.media/ff_calendar_thisweek.json';
        const NEWS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://www.forexlive.com/feed/';

        const COUNTRY_MAP = {
            USD:'🇺🇸 USD', EUR:'🇪🇺 EUR', GBP:'🇬🇧 GBP', JPY:'🇯🇵 JPY',
            AUD:'🇦🇺 AUD', NZD:'🇳🇿 NZD', CAD:'🇨🇦 CAD', CHF:'🇨🇭 CHF',
            CNY:'🇨🇳 CNY'
        };

        // --- INISIALISASI ---
        (async function init() {
            await Promise.all([fetchCalendar(), fetchNews()]);
        })();

        // --- FETCH CALENDAR (FALLBACK TO MOCK) ---
        async function fetchCalendar() {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const r = await fetch(CALENDAR_URL, { signal: controller.signal });
                clearTimeout(timeout);
                if (!r.ok) throw new Error('Status: ' + r.status);
                calendarData = await r.json();
                if (!Array.isArray(calendarData) || calendarData.length === 0) throw new Error('Empty data');
                isUsingMockData = false;
            } catch(e) {
                console.warn('⚠️ API kalender gagal, menggunakan data simulasi:', e.message);
                calendarData = generateMockCalendar();
                isUsingMockData = true;
            } finally {
                updateStatusLabel();
                populateCurrencyFilter();
                renderCalendar();
            }
        }

        function updateStatusLabel() {
            const el = document.getElementById('calendar-status');
            if (!el) return;
            if (isUsingMockData) {
                el.innerHTML = '🔸 Data simulasi – API tidak terjangkau. Event berikutnya adalah ilustrasi.';
            } else {
                el.innerHTML = '✅ Data kalender real-time berhasil dimuat.';
            }
        }

        // --- GENERATE MOCK CALENDAR (7 hari ke depan) ---
        function generateMockCalendar() {
            const now = new Date();
            const events = [];
            const templates = [
                { title: 'Non-Farm Payrolls', country: 'USD', impact: 'High', forecast: '185K', previous: '215K' },
                { title: 'Unemployment Rate', country: 'USD', impact: 'High', forecast: '3.8%', previous: '3.9%' },
                { title: 'CPI m/m', country: 'EUR', impact: 'High', forecast: '0.3%', previous: '0.2%' },
                { title: 'CPI m/m', country: 'USD', impact: 'High', forecast: '0.2%', previous: '0.1%' },
                { title: 'GDP q/q', country: 'GBP', impact: 'High', forecast: '0.4%', previous: '0.5%' },
                { title: 'Retail Sales m/m', country: 'USD', impact: 'High', forecast: '0.6%', previous: '0.4%' },
                { title: 'Interest Rate Decision', country: 'AUD', impact: 'High', forecast: '4.35%', previous: '4.35%' },
                { title: 'Interest Rate Decision', country: 'JPY', impact: 'High', forecast: '0.10%', previous: '0.10%' },
                { title: 'Empire State Manufacturing Index', country: 'USD', impact: 'Medium', forecast: '-2.5', previous: '-4.0' },
                { title: 'Industrial Production m/m', country: 'EUR', impact: 'Medium', forecast: '0.5%', previous: '0.3%' },
                { title: 'Trade Balance', country: 'CAD', impact: 'Medium', forecast: '2.1B', previous: '1.8B' },
                { title: 'PPI m/m', country: 'USD', impact: 'Medium', forecast: '0.2%', previous: '0.1%' },
                { title: 'Consumer Confidence', country: 'USD', impact: 'Medium', forecast: '104.5', previous: '103.2' },
                { title: 'NZD Visitor Arrivals m/m', country: 'NZD', impact: 'Low', forecast: '1.2%', previous: '0.9%' },
                { title: 'BOE Gov Bailey Speaks', country: 'GBP', impact: 'Medium', forecast: '-', previous: '-' },
                { title: 'OPEC Monthly Report', country: 'USD', impact: 'Medium', forecast: '-', previous: '-' },
                { title: 'Building Permits m/m', country: 'USD', impact: 'Low', forecast: '1.2%', previous: '0.8%' },
                { title: 'Treasury Currency Report', country: 'USD', impact: 'Low', forecast: '-', previous: '-' },
            ];

            const hoursUTC = [1, 6, 8, 10, 12, 14, 16, 18, 20, 23];

            for (let i = 0; i < 7; i++) {
                const day = new Date(now);
                day.setDate(day.getDate() + i);
                const dayStr = day.toISOString().slice(0, 10);

                const dayEvents = templates.filter(() => Math.random() > 0.6);
                const chosen = dayEvents.length >= 2 ? dayEvents.slice(0, 3) : templates.slice(i * 2, (i * 2) + 2);

                chosen.forEach((tpl, idx) => {
                    const hour = hoursUTC[Math.floor(Math.random() * hoursUTC.length)];
                    const date = new Date(`${dayStr}T${String(hour).padStart(2,'0')}:00:00Z`);
                    events.push({
                        date: date.toISOString(),
                        country: tpl.country,
                        title: tpl.title,
                        impact: tpl.impact,
                        forecast: tpl.forecast,
                        previous: tpl.previous
                    });
                });
            }
            return events.sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        // --- FETCH NEWS ---
        async function fetchNews() {
            try {
                const r = await fetch(NEWS_URL);
                if (!r.ok) throw new Error('News fetch failed');
                const json = await r.json();
                newsData = json.items || [];
            } catch(e) {
                console.warn('⚠️ Gagal memuat berita:', e.message);
                newsData = [];
            } finally {
                renderNews();
            }
        }

        function populateCurrencyFilter() {
            const currencies = [...new Set(calendarData.map(e => e.country))].sort();
            const sel = document.getElementById('filterCurrency');
            sel.innerHTML = '<option value="ALL">ALL</option>';
            currencies.forEach(c => {
                const label = COUNTRY_MAP[c] || c;
                sel.innerHTML += `<option value="${c}">${label}</option>`;
            });
        }

        function switchTab(tab) {
            document.getElementById('view-calendar').style.display = tab === 'calendar' ? 'block' : 'none';
            document.getElementById('view-news').style.display = tab === 'news' ? 'block' : 'none';
            document.getElementById('tab-calendar').classList.toggle('active', tab === 'calendar');
            document.getElementById('tab-news').classList.toggle('active', tab === 'news');
        }

        function fmtTimeOnly(isoStr, tz) {
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return '--:--';
            const offset = tz === 'WIB' ? 7 : (tz === 'UTC' ? 0 : null);
            if (offset !== null) {
                const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
                const local = new Date(utc + (offset * 3600000));
                return local.toISOString().slice(11, 16);
            }
            return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function getDayLabel(isoStr, tz) {
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return '';
            const offset = tz === 'WIB' ? 7 : (tz === 'UTC' ? 0 : null);
            let localDate;
            if (offset !== null) {
                const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
                localDate = new Date(utc + (offset * 3600000));
            } else {
                localDate = d;
            }
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${days[localDate.getDay()]}, ${localDate.getDate()} ${months[localDate.getMonth()]} ${localDate.getFullYear()}`;
        }

        function getDayKey(isoStr, tz) {
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return '';
            const offset = tz === 'WIB' ? 7 : (tz === 'UTC' ? 0 : null);
            let localDate;
            if (offset !== null) {
                const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
                localDate = new Date(utc + (offset * 3600000));
            } else {
                localDate = d;
            }
            return localDate.toISOString().slice(0, 10);
        }

        function isPast(isoStr) {
            return new Date(isoStr) < new Date();
        }

        function renderCalendar() {
            const tz = document.getElementById('filterTz').value;
            const cur = document.getElementById('filterCurrency').value;
            const imp = document.getElementById('filterImpact').value;
            const search = document.getElementById('filterSearch').value.toLowerCase();

            let filtered = calendarData.filter(e => {
                if (cur !== 'ALL' && e.country !== cur) return false;
                if (imp !== 'ALL' && e.impact !== imp) return false;
                if (search && !e.title.toLowerCase().includes(search) && !e.country.toLowerCase().includes(search))
                    return false;
                return true;
            });

            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            const groups = {};
            filtered.forEach(e => {
                const key = getDayKey(e.date, tz);
                if (!groups[key]) groups[key] = { label: getDayLabel(e.date, tz), events: [] };
                groups[key].events.push(e);
            });

            const container = document.getElementById('calendar-content');
            if (!filtered.length) {
                container.innerHTML = '<div class="loading">Tidak ada event yang cocok dengan filter.</div>';
                return;
            }

            let html =
                '<table class="cal-table"><thead><tr><th>Waktu</th><th>Mata Uang</th><th>Event</th><th>Dampak</th><th>Forecast</th><th>Previous</th></tr></thead><tbody>';

            Object.keys(groups).sort().forEach(key => {
                const group = groups[key];
                html += `<tr class="day-group"><td colspan="6">📅 ${group.label}</td></tr>`;
                group.events.forEach(e => {
                    const pastClass = isPast(e.date) ? ' past-event' : '';
                    const impactClass = 'impact-' + (e.impact || 'low').toLowerCase();
                    html += `<tr class="${pastClass}">
                        <td>${fmtTimeOnly(e.date, tz)}</td>
                        <td>${COUNTRY_MAP[e.country] || e.country}</td>
                        <td style="text-align:left;">${e.title}</td>
                        <td><span class="impact ${impactClass}">${e.impact || 'Low'}</span></td>
                        <td>${e.forecast || '-'}</td>
                        <td>${e.previous || '-'}</td>
                    </tr>`;
                });
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderNews() {
            const search = document.getElementById('filterNewsSearch')?.value?.toLowerCase() || '';
            const container = document.getElementById('news-content');

            let filtered = newsData;
            if (search) {
                filtered = newsData.filter(
                    item =>
                        item.title.toLowerCase().includes(search) ||
                        (item.description && item.description.toLowerCase().includes(search))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML =
                    '<div class="loading">Tidak ada artikel berita. Mungkin API sedang terbatas.</div>';
                return;
            }

            let html = '';
            filtered.forEach(item => {
                const snippet = (item.description || '').replace(/\n/g, ' ').trim().slice(0, 200);
                const pubDate = item.pubDate
                    ? new Date(item.pubDate).toLocaleString('id-ID', { hour12: false })
                    : '';
                html += `
                <div class="news-card">
                    <h3>${item.title}</h3>
                    <div class="meta">${pubDate} ${item.author ? '· ' + item.author : ''}</div>
                    <div class="snippet">${snippet}${snippet.length >= 200 ? '...' : ''}</div>
                    <a href="${item.link}" target="_blank" rel="noopener">Baca selengkapnya →</a>
                </div>`;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
