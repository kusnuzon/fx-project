<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NES Emulator – CARTRIDGE VAULT</title>

    <!-- Global Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <!-- Nostalgist.js & JSZip -->
    <script src="https://unpkg.com/nostalgist"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎮 NES EMULATOR</h1>
        <p class="subtitle" style="text-align:center;">Drop .nes / .zip ROM</p>

        <div class="nes-dropzone" id="dropZone">
            ⬇️ Drop .nes / .zip file here<br>
            <span style="font-size:0.4rem;">or click to select</span>
        </div>

        <div class="nes-controls" id="controls" style="display:none;">
            <button onclick="nesEmulator.stop()">⏹️ STOP</button>
            <button onclick="nesEmulator.reset()">🔄 RESET</button>
            <button onclick="nesEmulator.toggleFullscreen()">📺 FULLSCREEN</button>
        </div>

        <div id="emulatorWrapper" class="nes-emulator-wrapper"></div>

        <!-- Virtual Gamepad (vanilla) -->
        <div class="virtual-gamepad" id="virtualGamepad" style="display:none;">
            <div class="gamepad-container">
                <div class="dpad">
                    <div class="gamepad-btn" data-btn="up">▲</div>
                    <div class="gamepad-btn" data-btn="left">◀</div>
                    <div class="gamepad-btn" data-btn="right">▶</div>
                    <div class="gamepad-btn" data-btn="down">▼</div>
                </div>
                <div class="action-buttons">
                    <div class="gamepad-btn" data-btn="a">A</div>
                    <div class="gamepad-btn" data-btn="b">B</div>
                </div>
                <div class="start-select">
                    <div class="gamepad-btn" data-btn="start">START</div>
                    <div class="gamepad-btn" data-btn="select">SELECT</div>
                </div>
            </div>
        </div>

        <div class="nes-status" id="statusText"></div>
    </div>

    <footer>🛠️ CARTRIDGE VAULT</footer>

    <script>
        // ── NES Emulator Core ──
        const KEY_MAP = {
            'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
            'z': 'a', 'x': 'b',
            'Enter': 'start', 'Shift': 'select'
        };

        const nesEmulator = {
            nostalgist: null,
            loaded: false,

            async loadROM(romData, fileName) {
                this.stop();
                document.getElementById('statusText').textContent = 'Loading...';
                try {
                    if (this.nostalgist) { try { this.nostalgist.exit(); } catch(e) {} }

                    const romBlob = new Blob([romData], { type: 'application/octet-stream' });
                    const romFile = new File([romBlob], fileName || 'game.nes');

                    this.nostalgist = await Nostalgist.nes(romFile);
                    const canvas = this.nostalgist.getCanvas();
                    canvas.classList.add('nes-emulator-canvas');

                    this.buildUI(canvas);
                    this.loaded = true;
                    document.getElementById('controls').style.display = 'flex';
                    document.getElementById('virtualGamepad').style.display = 'flex';
                    document.getElementById('statusText').textContent = 'ROM loaded • Keyboard / Gamepad ready';
                } catch (e) {
                    document.getElementById('statusText').textContent = 'Error: ' + e.message;
                }
            },

            buildUI(canvas) {
                const wrapper = document.getElementById('emulatorWrapper');
                wrapper.innerHTML = '';

                const container = document.createElement('div');
                container.id = 'emuContainer';
                container.appendChild(canvas);
                wrapper.appendChild(container);

                this.applyLayout();
                window.addEventListener('resize', () => this.applyLayout());
            },

            applyLayout() {
                const container = document.getElementById('emuContainer');
                if (!container) return;
                const isPortrait = window.innerHeight > window.innerWidth;
                container.className = isPortrait ? 'emu-portrait' : 'emu-landscape';
            },

            sendKey(key, type) {
                if (!this.nostalgist) return;
                const canvas = this.nostalgist.getCanvas();
                if (!canvas) return;
                canvas.dispatchEvent(new KeyboardEvent(type, { key, bubbles: true }));
            },

            pressButton(btn) {
                const key = Object.keys(KEY_MAP).find(k => KEY_MAP[k] === btn);
                if (key) this.sendKey(key, 'keydown');
            },

            releaseButton(btn) {
                const key = Object.keys(KEY_MAP).find(k => KEY_MAP[k] === btn);
                if (key) this.sendKey(key, 'keyup');
            },

            stop() {
                document.getElementById('emulatorWrapper').innerHTML = '';
                document.getElementById('controls').style.display = 'none';
                document.getElementById('virtualGamepad').style.display = 'none';
                document.getElementById('statusText').textContent = 'Emulator stopped.';
                this.loaded = false;
                if (this.nostalgist) { try { this.nostalgist.exit(); } catch(e) {} }
            },

            reset() {
                if (this.nostalgist) { try { this.nostalgist.restart(); } catch(e) {} }
                document.getElementById('statusText').textContent = 'Reset.';
            },

            toggleFullscreen() {
                const wrapper = document.getElementById('emulatorWrapper');
                if (!document.fullscreenElement) {
                    wrapper.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        };

        // ── Virtual Gamepad Setup (Vanilla JS) ──
        function setupVirtualGamepad() {
            const buttons = document.querySelectorAll('.gamepad-btn');
            buttons.forEach(btn => {
                const dataBtn = btn.dataset.btn;
                if (!dataBtn) return;

                const press = (e) => {
                    e.preventDefault();
                    btn.classList.add('active');
                    nesEmulator.pressButton(dataBtn);
                };
                const release = (e) => {
                    e.preventDefault();
                    btn.classList.remove('active');
                    nesEmulator.releaseButton(dataBtn);
                };

                btn.addEventListener('pointerdown', press);
                btn.addEventListener('pointerup', release);
                btn.addEventListener('pointerleave', release);
            });
        }

        // ── Drag & Drop / Click ──
        (function setupDropZone() {
            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', e => { dropZone.classList.remove('drag-over'); });
            dropZone.addEventListener('drop', async e => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (!file) return;
                handleFile(file);
            });
            dropZone.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.nes,.zip';
                input.onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };
                input.click();
            });
        })();

        async function handleFile(file) {
            const statusEl = document.getElementById('statusText');
            statusEl.textContent = 'Processing...';
            try {
                const buffer = await file.arrayBuffer();
                let romData, romName;
                if (file.name.toLowerCase().endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(buffer);
                    const nesFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.nes'));
                    if (!nesFile) throw new Error('No .nes file inside ZIP.');
                    romData = await zip.files[nesFile].async('uint8array');
                    romName = nesFile;
                } else {
                    romData = new Uint8Array(buffer);
                    romName = file.name;
                }
                await nesEmulator.loadROM(romData, romName);
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
            }
        }

        // ── Init ──
        setupVirtualGamepad();
    </script>
</body>
</html>
