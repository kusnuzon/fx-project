<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Toolbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 3rem;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .tool-list {
            list-style: none;
            display: grid;
            gap: 0.75rem;
        }
        .tool-list li a {
            display: block;
            background: #edf2f7;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            color: #2b6cb0;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .tool-list li a:hover {
            background: #bee3f8;
            border-color: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49,130,206,0.2);
        }
        .loading {
            text-align: center;
            color: #a0aec0;
            padding: 2rem;
        }
        .error {
            background: #fff5f5;
            color: #c53030;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #fc8181;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠 FX Toolbox</h1>
        <p class="subtitle">Modular tools, always up to date – from <code>fx-project</code></p>
        <div id="tools-container">
            <div class="loading">🔍 Scanning repository for tools...</div>
        </div>
        <div class="footer">
            <span>Automatically updated via GitHub API</span>
        </div>
    </div>

    <script>
        (async function() {
            // ── CONFIGURATION ── (already set for kusnuzon/fx-project)
            const GITHUB_USERNAME = 'kusnuzon';
            const REPO_NAME      = 'fx-project';
            const TOOLS_FOLDER   = '';            // '' if tools are in the repo root, otherwise 'tools/'
            const EXCLUDE_FILES  = ['index.html', '404.html', 'README.md'];

            const container = document.getElementById('tools-container');

            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_FOLDER}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`GitHub API error (${response.status}) – check that the repo is public.`);
                }

                const files = await response.json();

                const toolFiles = files.filter(file =>
                    file.type === 'file' &&
                    file.name.endsWith('.html') &&
                    !EXCLUDE_FILES.includes(file.name)
                );

                if (toolFiles.length === 0) {
                    container.innerHTML = '<p class="loading">No tool pages found yet. Push some HTML files to the repo!</p>';
                    return;
                }

                const list = document.createElement('ul');
                list.className = 'tool-list';

                toolFiles.forEach(file => {
                    const rawName = file.name.replace('.html', '');
                    const displayName = rawName
                        .replace(/[-_]/g, ' ')
                        .replace(/\b\w/g, char => char.toUpperCase());

                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = file.name;          // relative link works inside /fx-project/
                    link.textContent = displayName;
                    li.appendChild(link);
                    list.appendChild(li);
                });

                container.innerHTML = '';
                container.appendChild(list);

            } catch (error) {
                container.innerHTML = `<div class="error">⚠️ Could not load tools: ${error.message}</div>`;
                console.error(error);
            }
        })();
    </script>
</body>
</html>
