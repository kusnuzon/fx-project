<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SND_MODULE: OVERWORLD_BGM</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --gold: #cfba8c;
            --border: #33334a;
        }

        body {
            background: var(--bg);
            color: #cdcdd4;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sound-card {
            background: rgba(18, 18, 30, 0.95);
            border: 4px solid var(--border);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            max-width: 400px;
        }

        .status-lcd {
            background: #1a1a2e;
            border: 2px inset #000;
            padding: 1rem;
            color: #00ff99;
            font-size: 0.6rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            line-height: 1.8;
            text-shadow: 0 0 5px #00ff99;
        }

        .btn-play {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #3d3224;
            transition: 0.1s;
        }

        .btn-play:active {
            box-shadow: 0 0 0;
            transform: translate(4px, 4px);
        }

        .layer-viz {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 1rem;
        }

        .bar {
            width: 10px;
            height: 40px;
            background: #33334a;
            position: relative;
        }

        .bar-inner {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: var(--gold);
            transition: height 0.1s;
        }
    </style>
</head>
<body>

<div class="sound-card">
    <div class="status-lcd" id="display">
        SYSTEM READY...<br>
        CH1: SQUARE_1 [IDLE]<br>
        CH2: SQUARE_2 [IDLE]<br>
        CH3: TRIANGLE [IDLE]<br>
        CH4: NOISE    [IDLE]
    </div>

    <button class="btn-play" id="audioTrigger">BOOT BGM</button>

    <div class="layer-viz">
        <div class="bar"><div class="bar-inner" id="b1"></div></div>
        <div class="bar"><div class="bar-inner" id="b2"></div></div>
        <div class="bar"><div class="bar-inner" id="b3"></div></div>
        <div class="bar"><div class="bar-inner" id="b4"></div></div>
    </div>
</div>

<script>
/**
 * AUDIO ENGINE: 8-BIT SYNTHESIZER
 * Mengemulasi chip Ricoh 2A03 (NES)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const notes = {
    'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'Eb4': 311.13, 'E4': 329.63, 'F4': 349.23,
    'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'Bb4': 466.16, 'B4': 493.88,
    'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'Eb5': 622.25, 'E5': 659.25, 'F5': 698.46,
    'G5': 783.99, 'A5': 880.00, 'B5': 987.77, 'C6': 1046.50
};

function playNote(freq, startTime, duration, type = 'square', volume = 0.1) {
    if (!freq) return;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start(startTime);
    osc.stop(startTime + duration);
}

// Data Intro - Mario Overworld
const melody = [
    {n: 'E5', d: 0.1}, {n: 'E5', d: 0.1}, {n: 0, d: 0.1}, {n: 'E5', d: 0.1}, 
    {n: 0, d: 0.1}, {n: 'C5', d: 0.1}, {n: 'E5', d: 0.1}, {n: 0, d: 0.1},
    {n: 'G5', d: 0.2}, {n: 0, d: 0.2}, {n: 'G4', d: 0.2}
];

const bass = [
    {n: 'G3', d: 0.1}, {n: 'G3', d: 0.1}, {n: 0, d: 0.1}, {n: 'G3', d: 0.1},
    {n: 0, d: 0.1}, {n: 'E3', d: 0.1}, {n: 'G3', d: 0.1}, {n: 0, d: 0.1},
    {n: 'B3', d: 0.2}, {n: 0, d: 0.2}, {n: 'G2', d: 0.2}
];

let isPlaying = false;

document.getElementById('audioTrigger').addEventListener('click', () => {
    if (isPlaying) return;
    isPlaying = true;
    audioCtx.resume();
    
    let now = audioCtx.currentTime + 0.1;
    document.getElementById('display').innerHTML = "STATUS: RUNNING...<br>DECODING: MARIO_DRV.SND";

    // Play Melody (Square 1)
    melody.forEach(note => {
        if(note.n) playNote(notes[note.n], now, note.d, 'square', 0.1);
        now += note.d + 0.05;
    });

    // Play Bass (Triangle)
    let bassNow = audioCtx.currentTime + 0.1;
    bass.forEach(note => {
        if(note.n) playNote(notes[note.n], bassNow, note.d, 'triangle', 0.15);
        bassNow += note.d + 0.05;
    });

    // Visualizer Logic
    const bars = ['b1', 'b2', 'b3', 'b4'];
    const interval = setInterval(() => {
        bars.forEach(id => {
            document.getElementById(id).style.height = Math.random() * 100 + '%';
        });
    }, 100);

    setTimeout(() => {
        clearInterval(interval);
        bars.forEach(id => document.getElementById(id).style.height = '0%');
        document.getElementById('display').innerHTML = "SYSTEM READY...<br>LAST_STATUS: COMPLETED";
        isPlaying = false;
    }, 2000);
});

</script>
</body>
</html>
