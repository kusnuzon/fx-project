<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NES Emulator – CARTRIDGE VAULT</title>

    <!-- Global Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <!-- Nostalgist.js & JSZip -->
    <script src="https://unpkg.com/nostalgist"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../../data/js/virtual-gamepad.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎮 NES EMULATOR</h1>
        <p class="subtitle" style="text-align:center;">Drop .nes / .zip ROM – Powered by Nostalgist.js</p>

        <div class="nes-dropzone" id="dropZone">
            ⬇️ Drop .nes / .zip file here<br>
            <span style="font-size:0.4rem;">or click to select</span>
        </div>

        <div id="emulatorContainer"></div>

        <div class="nes-controls" id="controls" style="display:none;">
            <button onclick="nesEmulator.stop()" title="Stop">⏹️ STOP</button>
            <button onclick="nesEmulator.reset()" title="Reset">🔄 RESET</button>
        </div>

        <!-- Virtual Gamepad -->
        <div class="virtual-gamepad" id="virtualGamepad" style="display:none;">
            <div class="gamepad-container">
                <div class="dpad">
                    <div class="gamepad-btn" data-btn="up">▲</div>
                    <div class="gamepad-btn" data-btn="left">◀</div>
                    <div class="gamepad-btn" data-btn="right">▶</div>
                    <div class="gamepad-btn" data-btn="down">▼</div>
                </div>
                <div class="action-buttons">
                    <div class="gamepad-btn" data-btn="a">A</div>
                    <div class="gamepad-btn" data-btn="b">B</div>
                </div>
                <div class="start-select">
                    <div class="gamepad-btn" data-btn="start">START</div>
                    <div class="gamepad-btn" data-btn="select">SELECT</div>
                </div>
            </div>
        </div>

        <div class="nes-status" id="statusText"></div>
    </div>

    <footer>🛠️ CARTRIDGE VAULT</footer>

    <script>
        const nesEmulator = {
            nostalgist: null,
            gamepad: null,
            loaded: false,

            async loadROM(romData, fileName) {
                this.stop();
                document.getElementById('statusText').textContent = 'Loading emulator...';

                try {
                    // Hancurkan instance lama
                    if (this.nostalgist) {
                        try { this.nostalgist.exit(); } catch (e) {}
                    }

                    // Siapkan ROM sebagai Blob
                    const romBlob = new Blob([romData], { type: 'application/octet-stream' });
                    const romFile = new File([romBlob], fileName || 'game.nes', { type: 'application/octet-stream' });

                    // Luncurkan emulator Nostalgist.js
                    this.nostalgist = await Nostalgist.nes(romFile);

                    const canvas = this.nostalgist.getCanvas();
                    canvas.classList.add('nes-emulator-canvas');

                    // Masukkan ke container
                    const container = document.getElementById('emulatorContainer');
                    container.innerHTML = '';
                    container.appendChild(canvas);

                    // Tampilkan kontrol
                    document.getElementById('controls').style.display = 'flex';
                    this.showGamepad();
                    this.loaded = true;
                    document.getElementById('statusText').textContent = 'ROM loaded. Use keyboard (arrows, Z, X, Enter, Shift) or on‑screen buttons.';

                } catch (err) {
                    document.getElementById('statusText').textContent = 'Error: ' + err.message;
                    alert('Failed to load ROM: ' + err.message);
                }
            },

            showGamepad() {
                const container = document.getElementById('virtualGamepad');
                container.style.display = 'flex';
                if (!this.gamepad) {
                    this.gamepad = new VirtualGamepad({
                        containerSelector: '#virtualGamepad',
                        buttonActions: {
                            up:    { down: () => this.pressButton('up'),    up: () => this.releaseButton('up') },
                            down:  { down: () => this.pressButton('down'),  up: () => this.releaseButton('down') },
                            left:  { down: () => this.pressButton('left'),  up: () => this.releaseButton('left') },
                            right: { down: () => this.pressButton('right'), up: () => this.releaseButton('right') },
                            a:     { down: () => this.pressButton('a'),     up: () => this.releaseButton('a') },
                            b:     { down: () => this.pressButton('b'),     up: () => this.releaseButton('b') },
                            start: { down: () => this.pressButton('start'), up: () => this.releaseButton('start') },
                            select:{ down: () => this.pressButton('select'),up: () => this.releaseButton('select') }
                        }
                    });
                }
            },

            pressButton(btn) {
                if (!this.nostalgist) return;
                // Kirim langsung ke canvas
                const canvas = this.nostalgist.getCanvas();
                if (!canvas) return;
                canvas.dispatchEvent(new KeyboardEvent('keydown', { key: this.mapButtonToKey(btn), bubbles: true }));
            },
            releaseButton(btn) {
                if (!this.nostalgist) return;
                const canvas = this.nostalgist.getCanvas();
                if (!canvas) return;
                canvas.dispatchEvent(new KeyboardEvent('keyup', { key: this.mapButtonToKey(btn), bubbles: true }));
            },

            mapButtonToKey(btn) {
                const map = {
                    up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight',
                    a: 'x', b: 'z', start: 'Enter', select: 'Shift'
                };
                return map[btn] || '';
            },

            stop() {
                document.getElementById('emulatorContainer').innerHTML = '';
                document.getElementById('controls').style.display = 'none';
                document.getElementById('virtualGamepad').style.display = 'none';
                document.getElementById('statusText').textContent = 'Emulator stopped.';
                this.loaded = false;
                if (this.nostalgist) {
                    try { this.nostalgist.exit(); } catch (e) {}
                    this.nostalgist = null;
                }
            },

            reset() {
                if (this.nostalgist) {
                    try { this.nostalgist.restart(); } catch (e) {}
                    document.getElementById('statusText').textContent = 'Reset.';
                }
            }
        };

        // ── Drag & Drop / Click ──
        (function setupDropZone() {
            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', e => { dropZone.classList.remove('drag-over'); });
            dropZone.addEventListener('drop', async e => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (!file) return;
                handleFile(file);
            });
            dropZone.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.nes,.zip';
                input.onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };
                input.click();
            });
        })();

        async function handleFile(file) {
            const statusEl = document.getElementById('statusText');
            statusEl.textContent = 'Processing file...';
            try {
                const buffer = await file.arrayBuffer();
                let romData, romName;
                if (file.name.toLowerCase().endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(buffer);
                    const nesFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.nes'));
                    if (!nesFile) throw new Error('No .nes file found inside ZIP.');
                    romData = await zip.files[nesFile].async('uint8array');
                    romName = nesFile;
                } else {
                    romData = new Uint8Array(buffer);
                    romName = file.name;
                }
                await nesEmulator.loadROM(romData, romName);
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                alert(err.message);
            }
        }
    </script>
</body>
</html>
