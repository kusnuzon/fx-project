<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTRIDGE VAULT</title>

    <!-- Google Pixel Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- Global Retro Theme -->
    <link rel="stylesheet" href="data/css/retro-theme.css">

    <style>
        /* === DASHBOARD SPECIFIC (tidak mengganggu tools) === */

        /* Container utama dashboard – perhalus border & glow */
        .dashboard-container {
            position: relative;
            z-index: 2;
            max-width: 860px;
            margin: 2rem auto;
            background: rgba(16, 16, 28, 0.9);
            backdrop-filter: blur(4px);
            border: 4px solid #6c63ff;
            outline: 4px solid #3f3f5c;
            outline-offset: 6px;
            box-shadow:
                0 0 0 4px #1e1e2f,
                0 0 0 8px #0a0a14,
                0 10px 30px rgba(0, 0, 0, 0.7),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            padding: 2rem 2rem 1.5rem 2rem;
            border-radius: 4px;
        }

        /* Scanline di atas dashboard */
        .dashboard-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.1) 0px,
                rgba(0,0,0,0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
            border-radius: inherit;
        }

        .dashboard-container > * {
            position: relative;
            z-index: 20;
        }

        /* Header animasi */
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 2rem;
            color: #ffd700;
            text-shadow:
                3px 3px 0 #aa6600,
                6px 6px 0 rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
            text-align: center;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 3px 3px 0 #aa6600, 6px 6px 0 rgba(0,0,0,0.5), 0 0 8px rgba(255,215,0,0.2); }
            50%      { text-shadow: 3px 3px 0 #aa6600, 6px 6px 0 rgba(0,0,0,0.5), 0 0 18px rgba(255,215,0,0.5); }
        }

        .subtitle {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: #8b8bb0;
            text-align: center;
            margin-bottom: 2.2rem;
            line-height: 1.8;
        }
        .subtitle code {
            background: #2e2e42;
            padding: 0.2rem 0.5rem;
            color: #ffb86c;
        }

        /* Kategori */
        .category {
            margin-bottom: 2.2rem;
        }

        .category-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
            color: #c084fc;
            text-transform: uppercase;
            border-bottom: 4px double #6c63ff;
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }

        /* Grid tombol cartridge */
        .tool-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .tool-list li a {
            display: block;
            background: #1e1e2f;
            color: #e0e0e0;
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 1rem 1.2rem;
            text-align: center;
            border: 3px solid #3f3f5c;
            box-shadow:
                4px 4px 0 0 #0a0a14,
                inset 0 0 0 2px #2a2a40;
            transition: all 0.1s ease-in-out;
        }

        .tool-list li a:hover {
            background: #4e4b8e;
            border-color: #ffd700;
            color: #0d0d0d;
            transform: translate(-2px, -2px);
            box-shadow:
                6px 6px 0 0 #000,
                inset 0 0 0 2px #f0e68c;
        }

        /* Tanda buka tab baru */
        .tool-list li a[target="_blank"]::after {
            content: " ↗";
            font-size: 0.8em;
            opacity: 0.7;
        }

        .empty-folder {
            color: #6b6b80;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* Loading & error */
        .loading {
            text-align: center;
            color: #a0a0c0;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            padding: 2rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .error {
            background: #2a1212;
            color: #ffb3b3;
            padding: 1rem;
            border: 3px solid #ff4d4d;
            box-shadow: 4px 4px 0 #000;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        /* Footer animasi */
        .dashboard-footer {
            margin-top: 2rem;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.45rem;
            color: #5a5a7a;
            position: relative;
        }
        .dashboard-footer::after {
            content: "▶ PRESS START ▼";
            display: block;
            animation: flickerFooter 2.5s infinite;
        }

        @keyframes flickerFooter {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        /* Responsif */
        @media (max-width: 600px) {
            .dashboard-container {
                padding: 1.2rem;
                border-width: 3px;
                outline-width: 3px;
                outline-offset: 3px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .tool-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>🕹️ CARTRIDGE VAULT</h1>
        <p class="subtitle">Insert cartridge inside <code>tools/</code></p>

        <div id="tools-container">
            <div class="loading">> SCANNING CARTRIDGES...</div>
        </div>

        <div class="dashboard-footer"></div>
    </div>

    <script>
        (async function() {
            const GITHUB_USERNAME = 'kusnuzon';
            const REPO_NAME      = 'fx-project';
            const TOOLS_PARENT_FOLDER = 'tools';

            const container = document.getElementById('tools-container');

            try {
                const parentApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}`;
                const parentResponse = await fetch(parentApiUrl);
                if (!parentResponse.ok) throw new Error(`Folder "${TOOLS_PARENT_FOLDER}" not found.`);

                const parentItems = await parentResponse.json();
                const categories = parentItems.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                if (categories.length === 0) {
                    container.innerHTML = `<div class="loading">No categories inside ${TOOLS_PARENT_FOLDER}/</div>`;
                    return;
                }

                const categoryPromises = categories.map(async folder => {
                    const folderApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}/${folder.name}`;
                    const folderResponse = await fetch(folderApiUrl);
                    if (!folderResponse.ok) return { category: folder.name, tools: [] };

                    const files = await folderResponse.json();
                    const htmlFiles = files.filter(file =>
                        file.type === 'file' &&
                        file.name.endsWith('.html') &&
                        !['index.html', '404.html'].includes(file.name)
                    );
                    return { category: folder.name, tools: htmlFiles };
                });

                const categoryResults = await Promise.all(categoryPromises);

                container.innerHTML = '';

                categoryResults.forEach(({ category, tools }) => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';

                    const displayName = category.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = displayName;
                    categoryDiv.appendChild(title);

                    if (tools.length === 0) {
                        const empty = document.createElement('p');
                        empty.className = 'empty-folder';
                        empty.textContent = '- No cartridges yet -';
                        categoryDiv.appendChild(empty);
                    } else {
                        const list = document.createElement('ul');
                        list.className = 'tool-list';

                        tools.forEach(file => {
                            const rawName = file.name.replace('.html', '');
                            const toolName = rawName.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

                            const li = document.createElement('li');
                            const link = document.createElement('a');
                            link.href = `${TOOLS_PARENT_FOLDER}/${category}/${file.name}`;
                            link.target = "_blank";
                            link.rel = "noopener noreferrer";
                            link.textContent = toolName;
                            li.appendChild(link);
                            list.appendChild(li);
                        });

                        categoryDiv.appendChild(list);
                    }

                    container.appendChild(categoryDiv);
                });

            } catch (error) {
                container.innerHTML = `<div class="error">⚠️ ${error.message}</div>`;
                console.error(error);
            }
        })();
    </script>
</body>
</html>
