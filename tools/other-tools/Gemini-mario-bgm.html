<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Overworld BGM | Cartridge Vault</title>

    <!-- Fonts & Retro Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <!-- Tone.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <style>
        .mario-wrapper {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 2rem auto;
            background: rgba(12, 12, 24, 0.95);
            border: 4px solid #e64300;
            outline: 4px solid #3d3d56;
            outline-offset: 6px;
            box-shadow: 0 0 0 4px #1e1e2f, 0 0 0 8px #0a0a14, 0 10px 30px rgba(0,0,0,0.7);
            padding: 1.5rem;
            border-radius: 4px;
            text-align: center;
        }
        .mario-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }
        .mario-wrapper > * { position: relative; z-index: 20; }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            color: #f0e6d2;
            margin-bottom: 0.3rem;
            text-shadow: 2px 2px 0 #4a3e2c;
        }

        .oscilloscope {
            width: 100%;
            height: 100px;
            background: #0a0a14;
            border: 2px solid #4b4b68;
            margin: 1.5rem 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
        }
        canvas#oscCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .mario-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 0.7rem 1.5rem;
            background: #2a2a3c;
            border: 2px solid #e64300;
            color: #f0e6d2;
            cursor: pointer;
            box-shadow: 3px 3px 0 #4a3e2c;
            transition: all 0.05s;
            text-transform: uppercase;
        }
        .mario-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #4a3e2c;
        }
        .mario-btn.active {
            background: #e64300;
            border-color: #f0e6d2;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="mario-wrapper">
        <h2>🍄 MARIO OVERWORLD</h2>
        <p style="font-family:'Press Start 2P',cursive;font-size:0.5rem;color:#9da5b4;">ACCURATE MELODY · TONE.JS</p>

        <div class="oscilloscope">
            <canvas id="oscCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="mario-btn" id="playBtn">▶ PLAY</button>
            <button class="mario-btn" id="stopBtn" style="display:none;">⏹ STOP</button>
        </div>
        <p style="font-family:'Press Start 2P',cursive;font-size:0.4rem;color:#5e5e78;margin-top:0.8rem;">
            NES APU STYLE · INFINITE LOOP
        </p>
    </div>

    <script>
        (() => {
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');
            const canvas = document.getElementById('oscCanvas');
            const ctx = canvas.getContext('2d');

            // ========== MELODY DATA (EXACT FROM YOUR REFERENCE) ==========
            const intro = [
                'E5', 'E5', null, 'E5',
                null, 'C5', 'E5', null,
                'G5', null, null, null,
                'G4', null, null, null,
            ];
            const A1 = [
                'C5', null, null, 'G4',
                null, null, 'E4', null,
                null, 'A4', null, 'B4',
                null, 'A#4', 'A4', null,
            ];
            const A2 = [
                'G4', 'C5', 'E5', 'A5',
                null, 'F5', null, 'G5',
                null, 'E5', null, 'C5',
                'D5', 'B4', null, null,
            ];
            const B1 = [
                null, null, 'G5', 'F#5',
                'F5', 'D#5', null, 'E5',
                null, 'G#4', 'A4', 'C5',
                null, 'A4', 'C5', 'D5',
            ];
            const B2 = [
                null, null, 'G5', 'F#5',
                'F5', 'D#5', null, 'E5',
                null, 'C6', null, 'C6',
                'C6', null, null, null,
            ];
            const B3 = [
                null, null, 'D#5', null,
                null, 'D5', null, null,
                'C5', null, null, null,
                null, null, null, null,
            ];
            const C1 = [
                'C5', 'C5', null, 'C5',
                null, 'C5', 'D5', null,
                'E5', 'C5', null, 'A4',
                'G4', null, null, null,
            ];
            const C2 = [
                'C5', 'C5', null, 'C5',
                null, 'C5', 'D5', 'E5',
                null, null, null, null,
                null, null, null, null,
            ];
            const D1 = [
                'E5', 'C5', null, 'G4',
                null, null, 'G#4', null,
                'A4', 'F5', null, 'F5',
                'A4', null, null, null,
            ];
            const D2 = [
                'B4', 'A5', null, 'A5',
                'A5', 'G5', null, 'F5',
                'E5', 'C5', null, 'A4',
                'G4', null, null, null,
            ];
            const D3 = [
                'B4', 'F5', null, 'F5',
                'F5', 'E5', null, 'D5',
                'C5', null, null, null,
                null, null, null, null,
            ];

            // Full melody line sesuai susunan asli
            const melodyLine = intro.concat(
                A1, A2, A1, A2,
                B1, B2, B1, B3,
                B1, B2, B1, B3,
                C1, C2, C1, intro,
                A1, A2, A1, A2,
                D1, D2, D1, D3,
                D1, D2, D1, D3,
                C1, C2, C1
            );

            // ========== TONE.JS SETUP ==========
            // Lead (pulse)
            const leadSynth = new Tone.MonoSynth({
                oscillator: { type: 'square' },
                envelope: { attack: 0.02, decay: 0.05, sustain: 0.5, release: 0.8 },
                volume: -12,
            }).toDestination();

            // Bass (triangle)
            const bassSynth = new Tone.MonoSynth({
                oscillator: { type: 'triangle' },
                envelope: { attack: 0.02, decay: 0.05, sustain: 0.5, release: 0.8 },
                volume: -18,
            }).toDestination();

            // Drum (noise)
            const noiseSynth = new Tone.NoiseSynth({
                noise: { type: 'white' },
                envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.05 },
                volume: -22,
            }).toDestination();

            // Reverb
            const reverb = new Tone.Freeverb(0.6, 500).toDestination();
            leadSynth.connect(reverb);
            bassSynth.connect(reverb);
            noiseSynth.connect(reverb);

            // Bass line sederhana (root notes per bagian)
            function getBassLine() {
                const sections = [
                    { start: 0, end: 16, root: 'C3' },
                    { start: 16, end: 48, root: 'C3' },
                    { start: 48, end: 80, root: 'F3' },
                    { start: 80, end: 112, root: 'C3' },
                    { start: 112, end: 144, root: 'F3' },
                    { start: 144, end: 176, root: 'C3' },
                    { start: 176, end: 208, root: 'C3' },
                    { start: 208, end: 240, root: 'G3' },
                    { start: 240, end: 272, root: 'C3' },
                    { start: 272, end: 304, root: 'F3' },
                    { start: 304, end: 336, root: 'C3' },
                    { start: 336, end: 368, root: 'G3' },
                    { start: 368, end: 400, root: 'C3' },
                    { start: 400, end: 432, root: 'C3' },
                ];
                const roots = [];
                for (let i = 0; i < melodyLine.length; i++) {
                    const sec = sections.find(s => i >= s.start && i < s.end);
                    roots.push(sec ? sec.root : 'C3');
                }
                return roots;
            }

            const bassLine = getBassLine();

            // ========== SEQUENCER ==========
            let leadSeq, bassSeq, drumSeq;
            let isPlaying = false;

            function createSequences() {
                leadSeq = new Tone.Sequence((time, note) => {
                    if (note) leadSynth.triggerAttackRelease(note, '8n', time);
                }, melodyLine, '8n');

                bassSeq = new Tone.Sequence((time, note) => {
                    bassSynth.triggerAttackRelease(note, '4n', time);
                }, bassLine, '4n');

                // Drum bunyi setiap langkah
                drumSeq = new Tone.Sequence((time) => {
                    noiseSynth.triggerAttackRelease('8n', time);
                }, new Array(melodyLine.length).fill(1), '8n');
            }

            function startPlayback() {
                if (isPlaying) return;
                Tone.start();
                createSequences();

                Tone.Transport.bpm.value = 400;
                Tone.Transport.loop = true;         // <-- loop tanpa batas
                Tone.Transport.loopStart = 0;
                // Durasi total dalam quarter note: (jumlah langkah * 8th) / 2 karena 1 quarter = 2 eighth
                const totalQuarters = melodyLine.length / 2;
                Tone.Transport.loopEnd = `${totalQuarters}q`;

                leadSeq.start(0);
                bassSeq.start(0);
                drumSeq.start(0);
                Tone.Transport.start();

                isPlaying = true;
                playBtn.classList.add('active');
                playBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
            }

            function stopPlayback() {
                if (!isPlaying) return;
                Tone.Transport.stop();
                Tone.Transport.cancel();
                if (leadSeq) leadSeq.dispose();
                if (bassSeq) bassSeq.dispose();
                if (drumSeq) drumSeq.dispose();
                isPlaying = false;
                playBtn.classList.remove('active');
                playBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            }

            // ========== VISUAL OSCILLOSCOPE ==========
            function drawOsc() {
                if (!canvas || !ctx) return;
                const w = canvas.width = canvas.clientWidth;
                const h = canvas.height = canvas.clientHeight;
                ctx.clearRect(0, 0, w, h);

                if (!isPlaying) {
                    ctx.strokeStyle = '#3f3f5c';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, h/2);
                    ctx.lineTo(w, h/2);
                    ctx.stroke();
                } else {
                    const now = Date.now() / 1000;
                    ctx.strokeStyle = '#e64300';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const center = h/2;
                    const amp = h * 0.4;
                    for (let x = 0; x < w; x++) {
                        const phase = (x / w) * 2 * Math.PI * 1.5 + now * 5;
                        const y = center + Math.sin(phase) * amp * 0.3;
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();

                    // Pixel grid
                    ctx.strokeStyle = 'rgba(78,78,104,0.3)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < w; i += 8) {
                        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
                    }
                    for (let i = 0; i < h; i += 8) {
                        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
                    }
                }
                requestAnimationFrame(drawOsc);
            }

            // ========== EVENT LISTENERS ==========
            playBtn.addEventListener('click', startPlayback);
            stopBtn.addEventListener('click', stopPlayback);

            // Init
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            drawOsc();

            window.addEventListener('beforeunload', () => {
                stopPlayback();
            });
        })();
    </script>
</body>
</html>
