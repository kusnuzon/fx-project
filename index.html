<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Toolbox</title>

    <!-- Pixel Font from Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* === GLOBAL RESET === */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === PIXEL DARK BACKGROUND === */
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;

            /* Subtle pixel grid */
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        /* === MONITOR FRAME === */
        .container {
            position: relative;
            max-width: 850px;
            width: 100%;
            background: #12121a;
            padding: 2.5rem 2rem 2rem 2rem;

            /* Pixelated border - multi-layer */
            border: 4px solid #6c63ff;
            outline: 4px solid #3f3f5c;
            outline-offset: 6px;
            box-shadow:
                0 0 0 4px #1e1e2f,
                0 0 0 8px #0a0a14,
                0 0 20px rgba(108, 99, 255, 0.4),
                inset 0 0 20px rgba(0,0,0,0.6);

            /* Retro screen curvature (subtle) */
            border-radius: 4px; /* sharp corners */
        }

        /* Optional scanlines */
        .container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15) 0px,
                rgba(0,0,0,0.15) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 10;
            border-radius: inherit;
        }

        /* Content above scanlines */
        .container > * {
            position: relative;
            z-index: 20;
        }

        /* === HEADER === */
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            color: #ffd700;          /* gold */
            text-shadow:
                3px 3px 0 #aa6600,
                6px 6px 0 rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            word-spacing: 4px;
        }

        .subtitle {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: #8b8bb0;
            margin-bottom: 2.2rem;
            line-height: 1.8;
        }
        .subtitle code {
            background: #2e2e42;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
            color: #ffb86c;
        }

        /* === CATEGORY SECTION === */
        .category {
            margin-bottom: 2.2rem;
        }

        .category-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
            color: #c084fc;
            text-transform: uppercase;
            border-bottom: 4px double #6c63ff;
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
            letter-spacing: 1px;
        }

        /* === TOOL LIST (GRID OF BUTTONS) === */
        .tool-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .tool-list li a {
            display: block;
            background: #1e1e2f;
            color: #e0e0e0;
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 1rem 1.2rem;
            text-align: center;

            /* Pixelated border */
            border: 3px solid #3f3f5c;
            box-shadow:
                4px 4px 0 0 #0a0a14,
                inset 0 0 0 2px #2a2a40;
            transition: all 0.1s ease-in-out;
            letter-spacing: 0.5px;
        }

        .tool-list li a:hover {
            background: #4e4b8e;
            border-color: #ffd700;
            color: #0d0d0d;
            transform: translate(-2px, -2px);
            box-shadow:
                6px 6px 0 0 #000,
                inset 0 0 0 2px #f0e68c;
            text-shadow: none;
        }

        /* Empty folder note */
        .empty-folder {
            color: #6b6b80;
            font-style: italic;
            font-size: 0.85rem;
            padding-left: 0.5rem;
        }

        /* === LOADING & ERROR === */
        .loading {
            text-align: center;
            color: #a0a0c0;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            padding: 2rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .error {
            background: #2a1212;
            color: #ffb3b3;
            padding: 1rem;
            border: 3px solid #ff4d4d;
            box-shadow: 4px 4px 0 #000;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        /* === FOOTER === */
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.4rem;
            color: #5a5a7a;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
            }
            .container {
                padding: 1.5rem;
                border-width: 3px;
                outline-width: 3px;
                outline-offset: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ PIXEL TOOLS</h1>
        <p class="subtitle">All tools inside <code>tools/</code> folder</p>

        <div id="tools-container">
            <div class="loading">> SCANNING TOOLS...</div>
        </div>

        <div class="footer">▲ PRESS START ▲</div>
    </div>

    <script>
        (async function() {
            const GITHUB_USERNAME = 'kusnuzon';
            const REPO_NAME      = 'fx-project';
            const TOOLS_PARENT_FOLDER = 'tools';

            const container = document.getElementById('tools-container');

            try {
                const parentApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}`;
                const parentResponse = await fetch(parentApiUrl);

                if (!parentResponse.ok) {
                    throw new Error(`Folder "${TOOLS_PARENT_FOLDER}" not found or repo is private (status ${parentResponse.status}).`);
                }

                const parentItems = await parentResponse.json();

                const categories = parentItems.filter(item =>
                    item.type === 'dir' && !item.name.startsWith('.')
                );

                if (categories.length === 0) {
                    container.innerHTML = `<div class="loading">No categories inside ${TOOLS_PARENT_FOLDER}/</div>`;
                    return;
                }

                const categoryPromises = categories.map(async folder => {
                    const folderApiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TOOLS_PARENT_FOLDER}/${folder.name}`;
                    const folderResponse = await fetch(folderApiUrl);
                    if (!folderResponse.ok) return { category: folder.name, tools: [] };

                    const files = await folderResponse.json();
                    const htmlFiles = files.filter(file =>
                        file.type === 'file' &&
                        file.name.endsWith('.html') &&
                        !['index.html', '404.html'].includes(file.name)
                    );
                    return { category: folder.name, tools: htmlFiles };
                });

                const categoryResults = await Promise.all(categoryPromises);

                container.innerHTML = '';

                categoryResults.forEach(({ category, tools }) => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';

                    const displayName = category
                        .replace(/[-_]/g, ' ')
                        .replace(/\b\w/g, char => char.toUpperCase());

                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = displayName;
                    categoryDiv.appendChild(title);

                    if (tools.length === 0) {
                        const empty = document.createElement('p');
                        empty.className = 'empty-folder';
                        empty.textContent = '- No tools yet -';
                        categoryDiv.appendChild(empty);
                    } else {
                        const list = document.createElement('ul');
                        list.className = 'tool-list';

                        tools.forEach(file => {
                            const rawName = file.name.replace('.html', '');
                            const toolName = rawName
                                .replace(/[-_]/g, ' ')
                                .replace(/\b\w/g, char => char.toUpperCase());

                            const li = document.createElement('li');
                            const link = document.createElement('a');
                            link.href = `${TOOLS_PARENT_FOLDER}/${category}/${file.name}`;
                            link.textContent = toolName;
                            li.appendChild(link);
                            list.appendChild(li);
                        });

                        categoryDiv.appendChild(list);
                    }

                    container.appendChild(categoryDiv);
                });

            } catch (error) {
                container.innerHTML = `<div class="error">⚠️ ${error.message}</div>`;
                console.error(error);
            }
        })();
    </script>
</body>
</html>
