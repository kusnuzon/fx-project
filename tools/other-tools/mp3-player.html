<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Splitter | Cartridge Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../data/css/retro-theme.css">

    <style>
        .splitter-wrapper {
            position: relative;
            z-index: 2;
            max-width: 650px;
            margin: 2rem auto;
            background: rgba(12,12,24,0.95);
            border: 4px solid #6e6e8a;
            outline: 4px solid #3d3d56;
            outline-offset: 6px;
            box-shadow: 0 0 0 4px #1e1e2f, 0 0 0 8px #0a0a14, 0 10px 30px rgba(0,0,0,0.7);
            padding: 1.5rem;
            border-radius: 4px;
            text-align: center;
        }
        .splitter-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }
        .splitter-wrapper > * { position: relative; z-index: 20; }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #cfba8c;
            margin-bottom: 0.5rem;
        }

        .file-upload {
            margin: 1rem 0;
        }
        .file-upload label {
            display: inline-block;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 0.5rem 1rem;
            background: #2a2a3c;
            border: 2px solid #4b4b68;
            color: #cfba8c;
            cursor: pointer;
        }
        .file-upload input { display: none; }

        canvas#oscCanvas {
            width: 100%;
            height: 100px;
            background: #0a0a14;
            border: 2px solid #4b4b68;
            margin: 1.5rem 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 0.5rem 0 1rem;
        }
        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: #2a2a3c;
            border: 2px solid #4b4b68;
            color: #d1d1db;
            cursor: pointer;
            box-shadow: 3px 3px 0 #0a0a14;
            transition: 0.1s;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #0a0a14;
        }
        .pixel-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .mode-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: #1e1e2e;
            border: 2px solid #3f3f5c;
            color: #9da5b4;
            cursor: pointer;
            transition: all 0.1s;
        }
        .mode-btn.active {
            background: #4b4a6e;
            border-color: #cfba8c;
            color: #f0e6d2;
            box-shadow: 0 0 8px rgba(207,186,140,0.4);
        }
    </style>
</head>
<body>
    <div class="splitter-wrapper">
        <h2>🔊 MP3 SPLITTER</h2>
        <p style="font-family:'Press Start 2P',cursive;font-size:0.5rem;color:#9da5b4;">UPLOAD MP3 & SPLIT SOUND</p>

        <div class="file-upload">
            <label for="mp3File">📁 SELECT MP3</label>
            <input type="file" id="mp3File" accept="audio/mpeg, audio/mp3, audio/wav, audio/ogg">
        </div>

        <div class="mode-buttons" id="modeButtons" style="display:none;">
            <button class="mode-btn active" data-mode="normal">NORMAL</button>
            <button class="mode-btn" data-mode="instrumental">INSTRUMENTAL</button>
            <button class="mode-btn" data-mode="vocal">VOCAL</button>
            <button class="mode-btn" data-mode="left">LEFT</button>
            <button class="mode-btn" data-mode="right">RIGHT</button>
        </div>

        <canvas id="oscCanvas"></canvas>

        <div class="controls" id="playerControls" style="display:none;">
            <button class="pixel-btn" id="playBtn">▶ PLAY</button>
            <button class="pixel-btn" id="pauseBtn" disabled>⏸ PAUSE</button>
            <button class="pixel-btn" id="stopBtn" disabled>⏹ STOP</button>
        </div>
    </div>

    <script>
        (() => {
            const mp3Input = document.getElementById('mp3File');
            const modeButtons = document.getElementById('modeButtons');
            const playerControls = document.getElementById('playerControls');
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');
            const canvas = document.getElementById('oscCanvas');
            const ctx = canvas.getContext('2d');

            let audioContext = null;
            let sourceNode = null;          // AudioBufferSourceNode
            let splitterNode = null;        // ChannelSplitter (2->2)
            let mergerNode = null;          // ChannelMerger (2->1)
            let gainNode = null;            // Master gain
            let analyserNode = null;        // Analyser untuk visual
            let audioBuffer = null;
            let isPlaying = false;
            let currentMode = 'normal';
            let startTime = 0;
            let pauseOffset = 0;

            // Mode management
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const newMode = btn.dataset.mode;
                    if (newMode !== currentMode && isPlaying) {
                        // Rebuild pipeline without stopping
                        rebuildSplitter(newMode);
                    } else {
                        currentMode = newMode;
                    }
                });
            });

            function rebuildSplitter(mode) {
                if (!sourceNode || !audioBuffer) return;
                // Store current position
                const elapsed = audioContext.currentTime - startTime + pauseOffset;
                // Stop old source
                try { sourceNode.stop(); } catch(e) {}
                // Create new source
                sourceNode = audioContext.createBufferSource();
                sourceNode.buffer = audioBuffer;
                sourceNode.loop = false;
                // Rebuild pipeline based on mode
                disconnectOldPipeline();
                buildPipeline(mode);
                // Start from previous position
                sourceNode.start(0, elapsed % audioBuffer.duration);
                startTime = audioContext.currentTime - (elapsed % audioBuffer.duration);
                currentMode = mode;
            }

            function disconnectOldPipeline() {
                if (splitterNode) {
                    splitterNode.disconnect();
                    mergerNode.disconnect();
                }
                if (sourceNode) sourceNode.disconnect();
            }

            function buildPipeline(mode) {
                const ctx = audioContext;
                // Create splitter (2 outputs: left, right)
                splitterNode = ctx.createChannelSplitter(2);
                mergerNode = ctx.createChannelMerger(2);

                if (mode === 'normal') {
                    // Connect source -> splitter -> merger -> gain -> analyser -> dest
                    sourceNode.connect(splitterNode);
                    splitterNode.connect(mergerNode, 0, 0); // left to left
                    splitterNode.connect(mergerNode, 1, 1); // right to right
                } else if (mode === 'left') {
                    sourceNode.connect(splitterNode);
                    // left to both channels
                    splitterNode.connect(mergerNode, 0, 0);
                    splitterNode.connect(mergerNode, 0, 1);
                } else if (mode === 'right') {
                    sourceNode.connect(splitterNode);
                    splitterNode.connect(mergerNode, 1, 0);
                    splitterNode.connect(mergerNode, 1, 1);
                } else if (mode === 'instrumental') {
                    // Vocal removal: left - right (phase cancelation)
                    const gainL = ctx.createGain();
                    gainL.gain.value = 1;
                    const gainR = ctx.createGain();
                    gainR.gain.value = -1;
                    const mergerLR = ctx.createChannelMerger(2);
                    sourceNode.connect(splitterNode);
                    splitterNode.connect(gainL, 0);
                    splitterNode.connect(gainR, 0);
                    gainL.connect(mergerLR, 0, 0);
                    gainR.connect(mergerLR, 0, 1);
                    // Then connect mergerLR to both channels of main merger
                    mergerLR.connect(mergerNode, 0, 0);
                    mergerLR.connect(mergerNode, 0, 1);
                } else if (mode === 'vocal') {
                    // Center extraction: left + right
                    const gainL = ctx.createGain();
                    gainL.gain.value = 1;
                    const gainR = ctx.createGain();
                    gainR.gain.value = 1;
                    const mergerCenter = ctx.createChannelMerger(2);
                    sourceNode.connect(splitterNode);
                    splitterNode.connect(gainL, 0);
                    splitterNode.connect(gainR, 1);
                    gainL.connect(mergerCenter, 0, 0);
                    gainR.connect(mergerCenter, 0, 1);
                    mergerCenter.connect(mergerNode, 0, 0);
                    mergerCenter.connect(mergerNode, 0, 1);
                }

                // Connect merger to gain -> analyser -> destination
                gainNode = ctx.createGain();
                analyserNode = ctx.createAnalyser();
                analyserNode.fftSize = 256;
                mergerNode.connect(gainNode);
                gainNode.connect(analyserNode);
                analyserNode.connect(ctx.destination);
            }

            async function loadAudio(file) {
                const arrayBuffer = await file.arrayBuffer();
                const ctx = new AudioContext();
                audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                audioContext = ctx;
                modeButtons.style.display = 'flex';
                playerControls.style.display = 'flex';
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
                currentMode = 'normal';
                document.querySelector('[data-mode="normal"]').classList.add('active');
                document.querySelectorAll('[data-mode]:not([data-mode="normal"])').forEach(b => b.classList.remove('active'));
            }

            function play() {
                if (!audioBuffer) return;
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                if (isPlaying) return;

                // Create source
                sourceNode = audioContext.createBufferSource();
                sourceNode.buffer = audioBuffer;
                buildPipeline(currentMode);
                sourceNode.start(0, pauseOffset);
                startTime = audioContext.currentTime - pauseOffset;
                isPlaying = true;
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;

                sourceNode.onended = () => {
                    if (isPlaying) {
                        stopPlayback();
                    }
                };
            }

            function pause() {
                if (!isPlaying) return;
                // record offset
                pauseOffset = (audioContext.currentTime - startTime) % audioBuffer.duration;
                sourceNode.stop();
                sourceNode.disconnect();
                isPlaying = false;
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = false;
            }

            function stopPlayback() {
                if (sourceNode) {
                    try { sourceNode.stop(); } catch(e) {}
                    sourceNode.disconnect();
                }
                disconnectOldPipeline();
                isPlaying = false;
                pauseOffset = 0;
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            }

            mp3Input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    loadAudio(file);
                }
            });

            playBtn.addEventListener('click', play);
            pauseBtn.addEventListener('click', pause);
            stopBtn.addEventListener('click', stopPlayback);

            // Visualisation
            function drawOsc() {
                const w = canvas.width = canvas.clientWidth;
                const h = canvas.height = canvas.clientHeight;
                ctx.clearRect(0, 0, w, h);
                if (analyserNode && isPlaying) {
                    const bufferLength = analyserNode.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    analyserNode.getByteTimeDomainData(dataArray);
                    ctx.strokeStyle = '#e64300';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const sliceWidth = w / bufferLength;
                    let x = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = (v * h) / 2;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                        x += sliceWidth;
                    }
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = '#3f3f5c';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, h/2);
                    ctx.lineTo(w, h/2);
                    ctx.stroke();
                }
                ctx.strokeStyle = 'rgba(78,78,104,0.3)';
                ctx.lineWidth = 1;
                for (let i = 0; i < w; i += 8) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
                }
                for (let i = 0; i < h; i += 8) {
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
                }
                requestAnimationFrame(drawOsc);
            }
            drawOsc();

        })();
    </script>
</body>
</html>
